// --- Audio System (Web Audio API) ---
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playSound(type) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  const t = audioCtx.currentTime;

  switch(type) {
    case 'jump':
      osc.type = 'square';
      osc.frequency.setValueAtTime(300, t);
      osc.frequency.exponentialRampToValueAtTime(600, t + 0.1);
      gain.gain.setValueAtTime(0.15, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
      osc.start(t); osc.stop(t + 0.15);
      break;
    case 'land':
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(150, t);
      osc.frequency.exponentialRampToValueAtTime(80, t + 0.08);
      gain.gain.setValueAtTime(0.1, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
      osc.start(t); osc.stop(t + 0.1);
      break;
    case 'death':
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(400, t);
      osc.frequency.exponentialRampToValueAtTime(50, t + 0.5);
      gain.gain.setValueAtTime(0.2, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
      osc.start(t); osc.stop(t + 0.5);
      break;
    case 'checkpoint':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, t);
      osc.frequency.setValueAtTime(659, t + 0.1);
      osc.frequency.setValueAtTime(784, t + 0.2);
      gain.gain.setValueAtTime(0.2, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      osc.start(t); osc.stop(t + 0.4);
      break;
    case 'complete':
      for (let i = 0; i < 5; i++) {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.type = 'sine';
        const notes = [523, 659, 784, 1047, 1319];
        o.frequency.setValueAtTime(notes[i], t + i * 0.12);
        g.gain.setValueAtTime(0.15, t + i * 0.12);
        g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.12 + 0.3);
        o.start(t + i * 0.12); o.stop(t + i * 0.12 + 0.3);
      }
      break;
    case 'taunt':
      osc.type = 'square';
      osc.frequency.setValueAtTime(200, t);
      osc.frequency.setValueAtTime(150, t + 0.05);
      osc.frequency.setValueAtTime(200, t + 0.1);
      gain.gain.setValueAtTime(0.1, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
      osc.start(t); osc.stop(t + 0.2);
      break;
    case 'bounce':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(200, t);
      osc.frequency.exponentialRampToValueAtTime(800, t + 0.15);
      gain.gain.setValueAtTime(0.15, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
      osc.start(t); osc.stop(t + 0.2);
      break;
    case 'speed':
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(400, t);
      osc.frequency.exponentialRampToValueAtTime(1200, t + 0.2);
      gain.gain.setValueAtTime(0.08, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
      osc.start(t); osc.stop(t + 0.25);
      break;
  }
}

// --- Input ---
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  if (gameState === 'menu' && (e.code === 'Space' || e.code === 'Enter')) {
    initAudio(); startGame();
  }
  if (gameState === 'victory' && e.code === 'Space') {
    gameState = 'menu';
  }
  if (gameState === 'playing' && e.code === 'KeyR') {
    killPlayer();
  }
  if (gameState === 'levelSelect') {
    if (e.code === 'Escape') gameState = 'menu';
    if (e.code === 'ArrowUp') levelSelectScroll = Math.max(0, levelSelectScroll - 1);
    if (e.code === 'ArrowDown') levelSelectScroll = Math.min(LEVELS.length - 1, levelSelectScroll);
    if (e.code === 'Enter' || e.code === 'Space') {
      if (completedLevels.has(levelSelectScroll) || levelSelectScroll === 0) {
        currentLevel = levelSelectScroll;
        loadLevel(currentLevel);
        gameState = 'playing';
      }
    }
  }
  if (gameState === 'menu' && e.code === 'KeyL') {
    initAudio(); gameState = 'levelSelect';
  }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// --- Particle System ---
let particles = [];
function spawnParticles(x, y, color, count, speed, life) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = Math.random() * speed;
    particles.push({
      x, y, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd - 2,
      life: life || 40, maxLife: life || 40, color, size: 2 + Math.random() * 4
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.1;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles(camX, camY) {
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - camX - p.size/2, p.y - camY - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

// --- Trail System ---
let trails = [];
function addTrail(x, y, color) {
  trails.push({ x, y, life: 15, maxLife: 15, color });
  if (trails.length > 50) trails.shift();
}

function updateTrails() {
  for (let i = trails.length - 1; i >= 0; i--) {
    trails[i].life--;
    if (trails[i].life <= 0) trails.splice(i, 1);
  }
}

function drawTrails(camX, camY) {
  for (const t of trails) {
    const alpha = (t.life / t.maxLife) * 0.5;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = t.color;
    ctx.fillRect(t.x - camX - 4, t.y - camY - 4, 8, 8);
  }
  ctx.globalAlpha = 1;
}

const LEVELS = [];
for (let i = 0; i < 15; i++) LEVELS.push(createLevel(i));

// --- Current Level State ---
let level = null;
let activePlatforms = [];
let activeHazards = [];
let activeCheckpoints = [];
let activeFinish = null;
let levelRisingLava = null;
let levelBg = 'prison';
let globalTimer = 0;

function loadLevel(idx) {
  const data = createLevel(idx);
  level = data;
  activePlatforms = JSON.parse(JSON.stringify(data.platforms));
  activeHazards = JSON.parse(JSON.stringify(data.hazards));
  activeCheckpoints = data.checkpoints.map(c => ({ ...c, activated: false }));
  activeFinish = data.finish ? { ...data.finish } : null;
  levelRisingLava = data.risingLava ? { ...data.risingLava } : null;
  levelBg = data.bg;
  player.x = data.spawnX;
  player.y = data.spawnY;
  player.spawnX = data.spawnX;
  player.spawnY = data.spawnY;
  player.vx = 0;
  player.vy = 0;
  player.dead = false;
  player.deadTimer = 0;
  player.onIce = false;
  particles = [];
  trails = [];
  globalTimer = 0;

  // Show Barry taunt
  showBarryTaunt(BARRY_TAUNTS[idx] || "You think you can escape?!");
}

function showBarryTaunt(text) {
  const tauntEl = document.getElementById('barry-taunt');
  tauntEl.textContent = '"' + text + '"  - Barry';
  tauntEl.style.opacity = 1;
  barryTauntTimer = 180;
  playSound('taunt');
}

function startGame() {
  gameState = 'playing';
  currentLevel = 0;
  deaths = 0;
  timerStart = performance.now();
  timerRunning = true;
  timerElapsed = 0;
  completedLevels.clear();
  loadLevel(currentLevel);
  // Show transition first
  gameState = 'levelTransition';
  transitionTimer = 120;
  transitionAlpha = 1;
}

function killPlayer() {
  if (player.dead) return;
  player.dead = true;
  player.deadTimer = 45;
  deaths++;
  screenShake = 12;
  playSound('death');
  spawnParticles(player.x + player.w/2, player.y + player.h/2, '#ff6600', 30, 8, 40);
  spawnParticles(player.x + player.w/2, player.y + player.h/2, '#ff0000', 20, 6, 35);
  document.getElementById('death-counter').textContent = 'Deaths: ' + deaths;
}

function respawnPlayer() {
  player.x = player.spawnX;
  player.y = player.spawnY;
  player.vx = 0;
  player.vy = 0;
  player.dead = false;
  player.onIce = false;
  // Reset falling platforms
  for (const p of activePlatforms) {
    if (p.type === 'falling') {
      p.falling = false;
      p.fallTimer = 0;
      p.y = p.origY;
    }
  }
  // Reset rising lava
  if (levelRisingLava) {
    levelRisingLava.y = levelRisingLava.maxY;
  }
  // Reset icicles
  for (const h of activeHazards) {
    if (h.type === 'icicle') {
      h.y = h.baseY;
      h.fallSpeed = 0;
      h.falling = false;
      h.timer = 0;
      h.respawnTimer = 0;
    }
  }
}

function nextLevel() {
  completedLevels.add(currentLevel);
  currentLevel++;
  if (currentLevel >= 15) {
    gameState = 'victory';
    timerRunning = false;
    playSound('complete');
    return;
  }
  playSound('complete');
  loadLevel(currentLevel);
  gameState = 'levelTransition';
  transitionTimer = 120;
  transitionAlpha = 1;
}

// --- Collision Helpers ---
function rectCollide(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function pointInRect(px, py, r) {
  return px >= r.x && px <= r.x + r.w && py >= r.y && py <= r.y + r.h;
}

// --- Update ---
function update() {
  globalTimer++;

  // Screen shake decay
  if (screenShake > 0) {
    screenShakeX = (Math.random() - 0.5) * screenShake * 2;
    screenShakeY = (Math.random() - 0.5) * screenShake * 2;
    screenShake *= 0.85;
    if (screenShake < 0.5) { screenShake = 0; screenShakeX = 0; screenShakeY = 0; }
  }

  // Barry taunt timer
  if (barryTauntTimer > 0) {
    barryTauntTimer--;
    if (barryTauntTimer === 0) {
      document.getElementById('barry-taunt').style.opacity = 0;
    }
  }

  // Timer
  if (timerRunning) {
    timerElapsed = performance.now() - timerStart;
  }
  const mins = Math.floor(timerElapsed / 60000);
  const secs = Math.floor((timerElapsed % 60000) / 1000);
  const ms = Math.floor((timerElapsed % 1000) / 10);
  document.getElementById('timer').textContent =
    String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0') + '.' + String(ms).padStart(2, '0');
  document.getElementById('level-name').textContent =
    gameState === 'playing' ? `Level ${currentLevel + 1}: ${LEVEL_NAMES[currentLevel]}` : '';

  if (gameState === 'levelTransition') {
    transitionTimer--;
    if (transitionTimer > 60) {
      transitionAlpha = 1;
    } else {
      transitionAlpha = transitionTimer / 60;
    }
    if (transitionTimer <= 0) {
      gameState = 'playing';
    }
    return;
  }

  if (gameState !== 'playing') return;

  // Player dead
  if (player.dead) {
    player.deadTimer--;
    if (player.deadTimer <= 0) respawnPlayer();
    updateParticles();
    return;
  }

  // --- Input ---
  const left = keys['ArrowLeft'] || keys['KeyA'];
  const right = keys['ArrowRight'] || keys['KeyD'];
  const jump = keys['ArrowUp'] || keys['KeyW'] || keys['Space'];

  // Horizontal movement
  const friction = player.onIce ? ICE_FRICTION : FRICTION;
  if (left) {
    player.vx -= PLAYER_SPEED * (player.onIce ? 0.15 : 0.5);
    player.facingRight = false;
  }
  if (right) {
    player.vx += PLAYER_SPEED * (player.onIce ? 0.15 : 0.5);
    player.facingRight = true;
  }
  if (!left && !right) {
    player.vx *= friction;
  }
  player.vx = Math.max(-12, Math.min(12, player.vx));

  // Jump buffer
  if (jump && !player._jumpHeld) {
    player.jumpBufferTimer = 8;
  }
  player._jumpHeld = jump;
  if (player.jumpBufferTimer > 0) player.jumpBufferTimer--;

  // Coyote time
  if (player.onGround) player.coyoteTimer = 6;
  if (player.coyoteTimer > 0) player.coyoteTimer--;

  // Jump
  if (player.jumpBufferTimer > 0 && player.coyoteTimer > 0) {
    player.vy = PLAYER_JUMP;
    player.onGround = false;
    player.coyoteTimer = 0;
    player.jumpBufferTimer = 0;
    playSound('jump');
  }

  // Wall jump
  if (player.jumpBufferTimer > 0 && player.wallSliding) {
    player.vy = WALL_JUMP_Y;
    player.vx = WALL_JUMP_X * -player.wallDir;
    player.wallSliding = false;
    player.jumpBufferTimer = 0;
    playSound('jump');
  }

  // Gravity
  player.vy += GRAVITY;
  if (player.vy > MAX_FALL) player.vy = MAX_FALL;

  // Wall sliding
  player.wallSliding = false;
  player.wallDir = 0;

  // --- Update platforms ---
  for (const p of activePlatforms) {
    if (p.type === 'moving') {
      p._prevX = p.x;
      p._prevY = p.y;
      const t = (Math.sin(globalTimer * 0.02 * p.speed) + 1) / 2;
      p.x = p.mx + (p.mx2 - p.mx) * t;
      p.y = p.my + (p.my2 - p.my) * t;
    }
    if (p.type === 'disappearing') {
      p.timer = (p.timer + 1) % p.interval;
      p._visible = p.timer < p.onTime;
    }
    if (p.type === 'falling' && p.falling) {
      p.fallTimer++;
      if (p.fallTimer > 20) {
        p.y += 5;
      }
    }
    if (p.type === 'electric') {
      p.timer = (p.timer + 1) % p.interval;
      p._electrified = p.timer < p.onTime;
    }
  }

  // --- Update hazards ---
  for (const h of activeHazards) {
    if (h.type === 'laser') {
      h.timer = (h.timer + 1) % h.interval;
      h._active = h.timer < h.onTime;
    }
    if (h.type === 'spinner') {
      h._angle = (h._angle || 0) + h.speed * 0.03;
    }
    if (h.type === 'crusher') {
      h.timer = (h.timer + 1) % h.interval;
      const phase = h.timer / h.interval;
      if (phase < 0.3) {
        // Resting
        h._y = h.restY;
      } else if (phase < 0.4) {
        // Crushing down
        h._y = h.restY + (h.crushY - h.restY) * ((phase - 0.3) / 0.1);
      } else if (phase < 0.5) {
        // Hold
        h._y = h.crushY;
      } else {
        // Return
        h._y = h.crushY + (h.restY - h.crushY) * ((phase - 0.5) / 0.5);
      }
    }
    if (h.type === 'icicle') {
      if (!h.falling && h.respawnTimer <= 0) {
        // Check if player is below
        const px = player.x + player.w / 2;
        if (Math.abs(px - (h.x + h.w / 2)) < 60) {
          h.timer++;
          if (h.timer > 30) {
            h.falling = true;
            h.fallSpeed = 0;
          }
        }
      }
      if (h.falling) {
        h.fallSpeed += 0.3;
        h.y += h.fallSpeed;
        if (h.y > 800) {
          h.falling = false;
          h.respawnTimer = 90;
          h.timer = 0;
        }
      }
      if (h.respawnTimer > 0) {
        h.respawnTimer--;
        if (h.respawnTimer <= 0) {
          h.y = h.baseY;
          h.fallSpeed = 0;
        }
      }
    }
  }

  // Rising lava
  if (levelRisingLava) {
    levelRisingLava.y -= levelRisingLava.speed;
    if (levelRisingLava.y < levelRisingLava.minY) levelRisingLava.y = levelRisingLava.minY;
  }

  // --- Move player & collision ---
  player.onGround = false;
  player.onIce = false;
  let prevWasOnGround = player.onGround;

  // Horizontal
  player.x += player.vx;
  for (const p of activePlatforms) {
    if (p.type === 'disappearing' && !p._visible) continue;
    if (p.type === 'falling' && p.fallTimer > 40) continue;
    if (rectCollide(player, p)) {
      if (player.vx > 0) {
        player.x = p.x - player.w;
        if (!player.onGround && (left || right)) {
          player.wallSliding = true;
          player.wallDir = 1;
          if (player.vy > 2) player.vy = 2;
        }
      } else if (player.vx < 0) {
        player.x = p.x + p.w;
        if (!player.onGround && (left || right)) {
          player.wallSliding = true;
          player.wallDir = -1;
          if (player.vy > 2) player.vy = 2;
        }
      }
      player.vx = 0;
    }
  }

  // Vertical
  player.y += player.vy;
  for (const p of activePlatforms) {
    if (p.type === 'disappearing' && !p._visible) continue;
    if (p.type === 'falling' && p.fallTimer > 40) continue;
    if (rectCollide(player, p)) {
      if (player.vy > 0) {
        player.y = p.y - player.h;
        if (!prevWasOnGround && player.vy > 4) playSound('land');
        player.vy = 0;
        player.onGround = true;

        // Platform type effects
        if (p.type === 'bounce') {
          player.vy = p.power;
          player.onGround = false;
          playSound('bounce');
          spawnParticles(player.x + player.w/2, player.y + player.h, NEON_GREEN, 10, 4, 20);
        }
        if (p.type === 'speed') {
          player.vx += p.dir * p.boost;
          playSound('speed');
          spawnParticles(player.x + player.w/2, player.y + player.h, NEON_BLUE, 8, 3, 15);
        }
        if (p.type === 'conveyor') {
          player.x += p.dir * p.speed;
        }
        if (p.type === 'ice') {
          player.onIce = true;
        }
        if (p.type === 'falling' && !p.falling) {
          p.falling = true;
          p.fallTimer = 0;
        }
        if (p.type === 'electric' && p._electrified) {
          killPlayer();
        }
        if (p.type === 'moving') {
          // Move player with platform
          const dx = p.x - (p._prevX || p.x);
          const dy = p.y - (p._prevY || p.y);
          player.x += dx;
          player.y += dy;
        }
      } else if (player.vy < 0) {
        player.y = p.y + p.h;
        player.vy = 0;
      }
    }
  }

  // Trail
  player.trailTimer++;
  if (player.trailTimer % 3 === 0 && (Math.abs(player.vx) > 2 || Math.abs(player.vy) > 3)) {
    addTrail(player.x + player.w/2, player.y + player.h/2, NEON_ORANGE);
  }

  // --- Hazard collision ---
  const playerRect = { x: player.x, y: player.y, w: player.w, h: player.h };

  for (const h of activeHazards) {
    if (h.type === 'lava' || h.type === 'spike') {
      if (rectCollide(playerRect, h)) killPlayer();
    }
    if (h.type === 'laser' && h._active) {
      if (rectCollide(playerRect, h)) killPlayer();
    }
    if (h.type === 'spinner') {
      const angle = h._angle || 0;
      const bx = h.x + Math.cos(angle) * h.radius;
      const by = h.y + Math.sin(angle) * h.radius;
      const bx2 = h.x + Math.cos(angle + Math.PI) * h.radius;
      const by2 = h.y + Math.sin(angle + Math.PI) * h.radius;
      // Check both ends
      const dist1 = Math.hypot(player.x + player.w/2 - bx, player.y + player.h/2 - by);
      const dist2 = Math.hypot(player.x + player.w/2 - bx2, player.y + player.h/2 - by2);
      if (dist1 < 25 || dist2 < 25) killPlayer();
    }
    if (h.type === 'crusher') {
      const crusherRect = { x: h.x, y: h._y || h.restY, w: h.w, h: h.h };
      if (rectCollide(playerRect, crusherRect)) killPlayer();
    }
    if (h.type === 'icicle' && h.falling) {
      const icicleRect = { x: h.x, y: h.y, w: h.w, h: h.h };
      if (rectCollide(playerRect, icicleRect)) killPlayer();
    }
  }

  // Rising lava collision
  if (levelRisingLava && player.y + player.h > levelRisingLava.y) {
    killPlayer();
  }

  // Fall death
  if (player.y > (level ? level.levelHeight + 200 : 1200)) {
    killPlayer();
  }

  // --- Checkpoints ---
  for (const cp of activeCheckpoints) {
    if (!cp.activated) {
      const dist = Math.hypot(player.x + player.w/2 - cp.x, player.y + player.h/2 - cp.y);
      if (dist < 40) {
        cp.activated = true;
        player.spawnX = cp.x - player.w/2;
        player.spawnY = cp.y - player.h;
        playSound('checkpoint');
        spawnParticles(cp.x, cp.y, NEON_GREEN, 25, 5, 30);
      }
    }
  }

  // --- Finish ---
  if (activeFinish) {
    const dist = Math.hypot(player.x + player.w/2 - activeFinish.x, player.y + player.h/2 - activeFinish.y);
    if (dist < 40) {
      nextLevel();
    }
  }

  // --- Camera ---
  const lookAhead = player.facingRight ? 100 : -100;
  camera.targetX = player.x + player.w/2 - canvas.width/2 + lookAhead;
  camera.targetY = player.y + player.h/2 - canvas.height/2 - 50;
  camera.x += (camera.targetX - camera.x) * 0.08;
  camera.y += (camera.targetY - camera.y) * 0.08;

  updateParticles();
  updateTrails();
}

// --- Drawing ---
function drawBackground(camX, camY) {
  // Parallax layers
  const w = canvas.width;
  const h = canvas.height;

  // Sky/ambient
  let grad;
  switch (levelBg) {
    case 'freezer':
      grad = ctx.createLinearGradient(0, 0, 0, h);
      grad.addColorStop(0, '#0a1525'); grad.addColorStop(1, '#1a2a4a');
      break;
    case 'kitchen': case 'freedom':
      grad = ctx.createLinearGradient(0, 0, 0, h);
      grad.addColorStop(0, '#1a0a00'); grad.addColorStop(1, '#3a1500');
      break;
    case 'rooftop':
      grad = ctx.createLinearGradient(0, 0, 0, h);
      grad.addColorStop(0, '#0a0a2a'); grad.addColorStop(1, '#1a1a3a');
      break;
    default:
      grad = ctx.createLinearGradient(0, 0, 0, h);
      grad.addColorStop(0, '#0a0a0a'); grad.addColorStop(1, '#1a1a2a');
  }
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);

  // Background pipes/bars (parallax)
  ctx.strokeStyle = '#222233';
  ctx.lineWidth = 3;
  for (let i = 0; i < 20; i++) {
    const bx = (i * 200 - camX * 0.2) % (w + 400) - 200;
    ctx.beginPath();
    ctx.moveTo(bx, 0);
    ctx.lineTo(bx, h);
    ctx.stroke();
  }

  // Mid-ground grating
  ctx.strokeStyle = '#181828';
  ctx.lineWidth = 2;
  for (let i = 0; i < 15; i++) {
    const by = (i * 100 - camY * 0.3) % (h + 200) - 100;
    ctx.beginPath();
    ctx.moveTo(0, by);
    ctx.lineTo(w, by);
    ctx.stroke();
  }

  // Foreground detail (prison bars, pipes etc.)
  ctx.strokeStyle = '#252540';
  ctx.lineWidth = 4;
  for (let i = 0; i < 10; i++) {
    const bx = (i * 350 - camX * 0.5) % (w + 700) - 350;
    ctx.beginPath();
    ctx.moveTo(bx, 0);
    ctx.lineTo(bx, h);
    ctx.stroke();
    // Rivet dots
    for (let j = 0; j < 6; j++) {
      ctx.fillStyle = '#333355';
      ctx.fillRect(bx - 3, j * (h / 5), 6, 6);
    }
  }
}

function drawPlatform(p, camX, camY) {
  const x = p.x - camX;
  const y = p.y - camY;

  if (p.type === 'disappearing') {
    if (!p._visible) {
      // Show ghost
      ctx.globalAlpha = 0.15;
      ctx.fillStyle = '#666688';
      ctx.fillRect(x, y, p.w, p.h);
      ctx.globalAlpha = 1;
      return;
    }
    // Blink warning
    const timeLeft = p.onTime - p.timer;
    if (timeLeft < 30 && timeLeft % 6 < 3) {
      ctx.globalAlpha = 0.5;
    }
  }

  if (p.type === 'falling' && p.falling) {
    ctx.globalAlpha = Math.max(0, 1 - p.fallTimer / 40);
    // Shake
    const shake = p.fallTimer < 20 ? (Math.random() - 0.5) * 3 : 0;
    ctx.fillStyle = '#665544';
    ctx.fillRect(x + shake, y, p.w, p.h);
    ctx.globalAlpha = 1;
    return;
  }

  // Base color
  let color = PLATFORM_COLOR;
  let edgeColor = NEON_BLUE;

  switch (p.type) {
    case 'bounce': color = '#114422'; edgeColor = NEON_GREEN; break;
    case 'speed': color = '#112244'; edgeColor = NEON_BLUE; break;
    case 'conveyor': color = '#333344'; edgeColor = '#888899'; break;
    case 'ice': color = '#223355'; edgeColor = '#88ccff'; break;
    case 'electric':
      if (p._electrified) {
        color = '#553300'; edgeColor = '#ffff00';
      } else {
        color = '#333344'; edgeColor = '#ffaa00';
      }
      break;
    case 'moving': color = '#334455'; edgeColor = NEON_PINK; break;
  }

  // Draw platform body
  ctx.fillStyle = color;
  ctx.fillRect(x, y, p.w, p.h);

  // Neon edge (top)
  ctx.fillStyle = edgeColor;
  ctx.fillRect(x, y, p.w, 3);

  // Glow
  ctx.shadowColor = edgeColor;
  ctx.shadowBlur = 8;
  ctx.fillRect(x, y, p.w, 2);
  ctx.shadowBlur = 0;

  // Conveyor arrows
  if (p.type === 'conveyor') {
    ctx.fillStyle = '#aaaacc';
    const arrowDir = p.dir;
    for (let i = 0; i < p.w / 30; i++) {
      const ax = x + ((i * 30 + globalTimer * p.speed * arrowDir * 0.3) % p.w + p.w) % p.w;
      ctx.beginPath();
      ctx.moveTo(ax, y + 8);
      ctx.lineTo(ax + 6 * arrowDir, y + p.h / 2);
      ctx.lineTo(ax, y + p.h - 8);
      ctx.fill();
    }
  }

  // Speed arrows
  if (p.type === 'speed') {
    ctx.fillStyle = NEON_BLUE;
    for (let i = 0; i < 3; i++) {
      const ax = x + 10 + i * 40 + ((globalTimer * 2) % 40);
      ctx.beginPath();
      ctx.moveTo(ax, y - 5);
      ctx.lineTo(ax + 15, y - 12);
      ctx.lineTo(ax, y - 19);
      ctx.fill();
    }
  }

  // Electric sparks
  if (p.type === 'electric' && p._electrified) {
    for (let i = 0; i < 5; i++) {
      const sx = x + Math.random() * p.w;
      const sy = y + Math.random() * p.h;
      ctx.fillStyle = '#ffff88';
      ctx.fillRect(sx, sy, 3, 3);
    }
    ctx.shadowColor = '#ffff00';
    ctx.shadowBlur = 15;
    ctx.fillStyle = 'rgba(255,255,0,0.1)';
    ctx.fillRect(x, y, p.w, p.h);
    ctx.shadowBlur = 0;
  }

  ctx.globalAlpha = 1;
}

function drawHazard(h, camX, camY) {
  const x = h.x - camX;
  const y = h.y - camY;

  if (h.type === 'lava') {
    // Lava glow
    const grad = ctx.createLinearGradient(x, y, x, y + Math.min(h.h, 60));
    grad.addColorStop(0, 'rgba(255,50,0,0.9)');
    grad.addColorStop(0.3, 'rgba(255,80,0,0.7)');
    grad.addColorStop(1, 'rgba(200,30,0,0.5)');
    ctx.fillStyle = grad;
    ctx.fillRect(x, y, h.w, h.h);

    // Animated bubbles
    for (let i = 0; i < h.w / 50; i++) {
      const bx = x + ((i * 50 + globalTimer * 0.5) % h.w);
      const by = y + 5 + Math.sin(globalTimer * 0.05 + i) * 8;
      ctx.fillStyle = '#ff8800';
      ctx.beginPath();
      ctx.arc(bx, by, 4 + Math.sin(globalTimer * 0.1 + i * 2) * 2, 0, Math.PI * 2);
      ctx.fill();
    }

    // Top glow line
    ctx.shadowColor = '#ff4400';
    ctx.shadowBlur = 20;
    ctx.fillStyle = '#ff6600';
    ctx.fillRect(x, y, h.w, 3);
    ctx.shadowBlur = 0;
  }

  if (h.type === 'spike') {
    ctx.fillStyle = '#cc2200';
    // Draw triangles
    const spikeW = 12;
    const count = Math.floor(h.w / spikeW);
    for (let i = 0; i < count; i++) {
      ctx.beginPath();
      ctx.moveTo(x + i * spikeW, y + h.h);
      ctx.lineTo(x + i * spikeW + spikeW / 2, y);
      ctx.lineTo(x + (i + 1) * spikeW, y + h.h);
      ctx.fill();
    }
    ctx.shadowColor = '#ff0000';
    ctx.shadowBlur = 10;
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  if (h.type === 'laser') {
    if (h._active) {
      ctx.fillStyle = 'rgba(255,0,0,0.8)';
      ctx.shadowColor = '#ff0000';
      ctx.shadowBlur = 15;
      ctx.fillRect(x, y, h.w, h.h);
      ctx.shadowBlur = 25;
      ctx.fillStyle = 'rgba(255,100,100,0.3)';
      ctx.fillRect(x - 3, y - 3, h.w + 6, h.h + 6);
      ctx.shadowBlur = 0;
    } else {
      // Dim laser
      ctx.fillStyle = 'rgba(100,0,0,0.3)';
      ctx.fillRect(x, y, h.w, h.h);
    }
  }

  if (h.type === 'spinner') {
    const angle = h._angle || 0;
    const cx = h.x - camX;
    const cy = h.y - camY;
    // Center pivot
    ctx.fillStyle = '#555577';
    ctx.beginPath();
    ctx.arc(cx, cy, 8, 0, Math.PI * 2);
    ctx.fill();
    // Arms
    ctx.strokeStyle = '#888899';
    ctx.lineWidth = 4;
    const ex1 = cx + Math.cos(angle) * h.radius;
    const ey1 = cy + Math.sin(angle) * h.radius;
    const ex2 = cx + Math.cos(angle + Math.PI) * h.radius;
    const ey2 = cy + Math.sin(angle + Math.PI) * h.radius;
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(ex1, ey1); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(ex2, ey2); ctx.stroke();
    // Ball ends
    ctx.fillStyle = '#ff4444';
    ctx.shadowColor = '#ff0000';
    ctx.shadowBlur = 12;
    ctx.beginPath(); ctx.arc(ex1, ey1, 12, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(ex2, ey2, 12, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
  }

  if (h.type === 'crusher') {
    const cy = (h._y || h.restY) - camY;
    ctx.fillStyle = '#555566';
    ctx.fillRect(x, cy, h.w, h.h);
    // Teeth at bottom
    ctx.fillStyle = '#cc3333';
    for (let i = 0; i < h.w / 15; i++) {
      ctx.beginPath();
      ctx.moveTo(x + i * 15, cy + h.h);
      ctx.lineTo(x + i * 15 + 7, cy + h.h + 10);
      ctx.lineTo(x + (i + 1) * 15, cy + h.h);
      ctx.fill();
    }
    ctx.shadowColor = '#ff0000';
    ctx.shadowBlur = 8;
    ctx.fillRect(x, cy + h.h, h.w, 3);
    ctx.shadowBlur = 0;
  }

  if (h.type === 'icicle' && h.respawnTimer <= 0) {
    const iy = h.y - camY;
    const ix = h.x - camX;
    ctx.fillStyle = '#88ccff';
    ctx.shadowColor = '#44aaff';
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.moveTo(ix, iy);
    ctx.lineTo(ix + h.w, iy);
    ctx.lineTo(ix + h.w / 2, iy + h.h);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;
    // Warning shake
    if (!h.falling && h.timer > 15) {
      const shake = (Math.random() - 0.5) * 3;
      ctx.fillStyle = '#aaddff';
      ctx.beginPath();
      ctx.moveTo(ix + shake, iy);
      ctx.lineTo(ix + h.w + shake, iy);
      ctx.lineTo(ix + h.w / 2 + shake, iy + h.h);
      ctx.closePath();
      ctx.fill();
    }
  }
}

function drawPlayer(camX, camY) {
  if (player.dead) return;

  const x = player.x - camX;
  const y = player.y - camY;

  // Glow
  ctx.shadowColor = NEON_ORANGE;
  ctx.shadowBlur = 12;

  // Body (orange jumpsuit)
  ctx.fillStyle = '#ee6600';
  ctx.fillRect(x + 2, y + 8, player.w - 4, player.h - 8);

  // Head
  ctx.fillStyle = '#ffcc88';
  ctx.fillRect(x + 3, y, player.w - 6, 10);

  // Eyes
  const eyeX = player.facingRight ? 4 : -2;
  ctx.fillStyle = '#000';
  ctx.fillRect(x + 6 + eyeX, y + 3, 3, 3);
  ctx.fillRect(x + 12 + eyeX, y + 3, 3, 3);

  // Wall sliding visual
  if (player.wallSliding) {
    ctx.fillStyle = '#ffaa44';
    for (let i = 0; i < 3; i++) {
      ctx.fillRect(
        x + (player.wallDir > 0 ? player.w : -3),
        y + 5 + i * 8,
        3, 4
      );
    }
  }

  // Prisoner number
  ctx.fillStyle = '#222';
  ctx.fillRect(x + 5, y + 14, player.w - 10, 1);

  ctx.shadowBlur = 0;
}

function drawCheckpoints(camX, camY) {
  for (const cp of activeCheckpoints) {
    const x = cp.x - camX;
    const y = cp.y - camY;
    const color = cp.activated ? NEON_GREEN : '#888888';

    // Flag pole
    ctx.fillStyle = '#666';
    ctx.fillRect(x, y - 30, 3, 50);

    // Flag
    ctx.fillStyle = color;
    ctx.shadowColor = color;
    ctx.shadowBlur = cp.activated ? 15 : 0;
    ctx.beginPath();
    ctx.moveTo(x + 3, y - 30);
    ctx.lineTo(x + 25, y - 22);
    ctx.lineTo(x + 3, y - 14);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Sparkle if activated
    if (cp.activated) {
      const sparkle = Math.sin(globalTimer * 0.1) * 3;
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(x + 12 + sparkle, y - 25, 3, 3);
    }
  }
}

function drawFinish(camX, camY) {
  if (!activeFinish) return;
  const x = activeFinish.x - camX;
  const y = activeFinish.y - camY;

  // Glowing portal
  const pulse = Math.sin(globalTimer * 0.05) * 5;
  ctx.strokeStyle = '#ffaa00';
  ctx.shadowColor = '#ffaa00';
  ctx.shadowBlur = 20 + pulse;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(x, y, 20 + pulse, 0, Math.PI * 2);
  ctx.stroke();

  ctx.strokeStyle = '#ffffff';
  ctx.shadowColor = '#ffffff';
  ctx.shadowBlur = 10;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(x, y, 12 + pulse * 0.5, 0, Math.PI * 2);
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Arrow
  ctx.fillStyle = '#ffcc00';
  ctx.font = '16px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('EXIT', x, y - 30 - pulse * 0.5);
}

function drawRisingLava(camX, camY) {
  if (!levelRisingLava) return;
  const y = levelRisingLava.y - camY;
  const color = levelRisingLava.color;

  // Lava body
  ctx.fillStyle = color;
  ctx.globalAlpha = 0.7;
  ctx.fillRect(0, y, canvas.width, canvas.height - y + 200);
  ctx.globalAlpha = 1;

  // Surface glow
  ctx.shadowColor = color;
  ctx.shadowBlur = 20;
  ctx.fillStyle = color;
  ctx.fillRect(0, y, canvas.width, 4);

  // Waves
  ctx.strokeStyle = color === '#ff3300' ? '#ff8800' : '#44cc66';
  ctx.lineWidth = 2;
  ctx.beginPath();
  for (let i = 0; i < canvas.width; i += 3) {
    const wy = y + Math.sin((i + globalTimer * 2) * 0.02) * 5;
    if (i === 0) ctx.moveTo(i, wy);
    else ctx.lineTo(i, wy);
  }
  ctx.stroke();
  ctx.shadowBlur = 0;
}

function drawBarryFace() {
  if (barryTauntTimer <= 0) return;

  const faceEl = document.getElementById('barry-face');
  // Draw Barry face on canvas instead
  const cx = canvas.width / 2;
  const by = canvas.height - 140;
  const alpha = Math.min(1, barryTauntTimer / 30);

  ctx.globalAlpha = alpha;

  // Face circle
  ctx.fillStyle = '#ff8866';
  ctx.beginPath();
  ctx.arc(cx, by, 22, 0, Math.PI * 2);
  ctx.fill();

  // Guard hat
  ctx.fillStyle = '#333366';
  ctx.fillRect(cx - 18, by - 28, 36, 12);
  ctx.fillRect(cx - 22, by - 18, 44, 5);

  // Evil eyes
  ctx.fillStyle = '#000';
  ctx.fillRect(cx - 10, by - 5, 6, 5);
  ctx.fillRect(cx + 4, by - 5, 6, 5);

  // Evil smile
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(cx, by + 5, 10, 0.1 * Math.PI, 0.9 * Math.PI);
  ctx.stroke();

  ctx.globalAlpha = 1;
}

function drawMenu() {
  const w = canvas.width;
  const h = canvas.height;

  // Background
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, '#0a0a15');
  grad.addColorStop(1, '#15152a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);

  // Animated bars
  for (let i = 0; i < 12; i++) {
    const bx = (i * 120 + globalTimer * 0.5) % (w + 200) - 100;
    ctx.strokeStyle = '#1a1a30';
    ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(bx, 0); ctx.lineTo(bx, h); ctx.stroke();
  }

  // Title
  ctx.textAlign = 'center';

  ctx.shadowColor = NEON_RED;
  ctx.shadowBlur = 30;
  ctx.fillStyle = '#ff3333';
  ctx.font = 'bold 56px "Courier New", monospace';
  ctx.fillText("BARRY'S PRISON RUN", w/2, h/2 - 100);
  ctx.shadowBlur = 0;

  // Subtitle
  ctx.fillStyle = NEON_ORANGE;
  ctx.shadowColor = NEON_ORANGE;
  ctx.shadowBlur = 15;
  ctx.font = '24px monospace';
  ctx.fillText('ESCAPE THE OBBY!', w/2, h/2 - 55);
  ctx.shadowBlur = 0;

  // Prisoner character
  const px = w/2;
  const py = h/2 + 10;
  ctx.fillStyle = '#ee6600';
  ctx.fillRect(px - 12, py, 24, 36);
  ctx.fillStyle = '#ffcc88';
  ctx.fillRect(px - 9, py - 12, 18, 14);
  ctx.fillStyle = '#000';
  ctx.fillRect(px - 5, py - 7, 4, 4);
  ctx.fillRect(px + 2, py - 7, 4, 4);

  // Instructions
  const blink = Math.sin(globalTimer * 0.08) > 0;
  if (blink) {
    ctx.fillStyle = '#ffffff';
    ctx.font = '20px monospace';
    ctx.fillText('Press SPACE or ENTER to start', w/2, h/2 + 80);
  }

  ctx.fillStyle = '#888899';
  ctx.font = '14px monospace';
  ctx.fillText('Arrow Keys / WASD to move  |  Space / W / Up to jump', w/2, h/2 + 120);
  ctx.fillText('Wall jump by pressing jump while sliding on walls', w/2, h/2 + 145);
  ctx.fillText('Press R to restart from checkpoint', w/2, h/2 + 170);
  ctx.fillText('Press L for level select', w/2, h/2 + 195);

  // Barry
  ctx.fillStyle = '#ff4444';
  ctx.shadowColor = '#ff0000';
  ctx.shadowBlur = 10;
  ctx.font = '16px monospace';
  ctx.fillText('"You think you can escape MY prison?!" - Barry', w/2, h/2 + 240);
  ctx.shadowBlur = 0;
}

function drawLevelTransition() {
  const w = canvas.width;
  const h = canvas.height;

  ctx.fillStyle = `rgba(0,0,0,${transitionAlpha * 0.9})`;
  ctx.fillRect(0, 0, w, h);

  if (transitionAlpha > 0.3) {
    ctx.textAlign = 'center';
    ctx.globalAlpha = transitionAlpha;

    // Level number
    ctx.fillStyle = NEON_ORANGE;
    ctx.shadowColor = NEON_ORANGE;
    ctx.shadowBlur = 20;
    ctx.font = 'bold 48px monospace';
    ctx.fillText(`LEVEL ${currentLevel + 1}`, w/2, h/2 - 40);
    ctx.shadowBlur = 0;

    // Level name
    ctx.fillStyle = '#ffffff';
    ctx.font = '28px monospace';
    ctx.fillText(LEVEL_NAMES[currentLevel], w/2, h/2 + 10);

    // Barry taunt
    ctx.fillStyle = '#ff4444';
    ctx.font = '16px monospace';
    const taunt = BARRY_TAUNTS[currentLevel];
    ctx.fillText('"' + taunt + '"', w/2, h/2 + 60);

    // Barry face
    ctx.fillStyle = '#ff8866';
    ctx.beginPath();
    ctx.arc(w/2, h/2 + 100, 18, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#333366';
    ctx.fillRect(w/2 - 15, h/2 + 78, 30, 10);
    ctx.fillRect(w/2 - 18, h/2 + 86, 36, 4);
    ctx.fillStyle = '#000';
    ctx.fillRect(w/2 - 8, h/2 + 96, 5, 4);
    ctx.fillRect(w/2 + 3, h/2 + 96, 5, 4);
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(w/2, h/2 + 105, 8, 0.1 * Math.PI, 0.9 * Math.PI);
    ctx.stroke();

    ctx.globalAlpha = 1;
  }
}

function drawVictory() {
  const w = canvas.width;
  const h = canvas.height;

  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, '#001a00');
  grad.addColorStop(1, '#003300');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);

  // Confetti
  for (let i = 0; i < 50; i++) {
    const cx = (i * 47 + globalTimer * (1 + i % 3)) % w;
    const cy = (i * 31 + globalTimer * (0.5 + i % 2)) % h;
    const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff'];
    ctx.fillStyle = colors[i % colors.length];
    ctx.fillRect(cx, cy, 6, 6);
  }

  ctx.textAlign = 'center';

  ctx.fillStyle = NEON_GREEN;
  ctx.shadowColor = NEON_GREEN;
  ctx.shadowBlur = 30;
  ctx.font = 'bold 60px monospace';
  ctx.fillText('FREEDOM!!!', w/2, h/2 - 80);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#ffffff';
  ctx.font = '24px monospace';
  ctx.fillText('You escaped Barry\'s Prison!', w/2, h/2 - 30);

  // Stats
  ctx.fillStyle = NEON_ORANGE;
  ctx.font = '20px monospace';
  const mins = Math.floor(timerElapsed / 60000);
  const secs = Math.floor((timerElapsed % 60000) / 1000);
  ctx.fillText(`Time: ${mins}m ${secs}s`, w/2, h/2 + 20);
  ctx.fillText(`Deaths: ${deaths}`, w/2, h/2 + 50);

  // Rating
  let rating = 'LEGENDARY ESCAPIST';
  if (deaths > 100) rating = 'PERSISTENT PRISONER';
  else if (deaths > 50) rating = 'DETERMINED DETAINEE';
  else if (deaths > 20) rating = 'SKILLED FUGITIVE';
  else if (deaths > 5) rating = 'MASTER ESCAPIST';

  ctx.fillStyle = '#ffcc00';
  ctx.font = '22px monospace';
  ctx.fillText(`Rating: ${rating}`, w/2, h/2 + 90);

  // Barry defeated
  ctx.fillStyle = '#ff4444';
  ctx.font = '16px monospace';
  ctx.fillText('"NOOOOO! How did you escape?! This isn\'t over!" - Barry', w/2, h/2 + 140);

  const blink = Math.sin(globalTimer * 0.08) > 0;
  if (blink) {
    ctx.fillStyle = '#ffffff';
    ctx.font = '18px monospace';
    ctx.fillText('Press SPACE to return to menu', w/2, h/2 + 190);
  }
}

function drawLevelSelect() {
  const w = canvas.width;
  const h = canvas.height;

  ctx.fillStyle = '#0a0a15';
  ctx.fillRect(0, 0, w, h);

  ctx.textAlign = 'center';
  ctx.fillStyle = NEON_ORANGE;
  ctx.font = 'bold 36px monospace';
  ctx.fillText('LEVEL SELECT', w/2, 60);

  ctx.fillStyle = '#666';
  ctx.font = '14px monospace';
  ctx.fillText('Arrow keys to navigate, Enter to play, Escape to go back', w/2, 90);

  const startY = 130;
  const itemH = 40;
  for (let i = 0; i < LEVEL_NAMES.length; i++) {
    const y = startY + i * itemH;
    const isSelected = i === levelSelectScroll;
    const isCompleted = completedLevels.has(i);
    const isLocked = !isCompleted && i > 0 && !completedLevels.has(i - 1);

    if (isSelected) {
      ctx.fillStyle = 'rgba(255,170,0,0.15)';
      ctx.fillRect(w/2 - 250, y - 5, 500, itemH - 5);
    }

    ctx.fillStyle = isLocked ? '#444' : (isSelected ? '#ffcc00' : (isCompleted ? NEON_GREEN : '#aaaacc'));
    ctx.font = `${isSelected ? 'bold ' : ''}18px monospace`;
    const status = isCompleted ? ' [CLEARED]' : (isLocked ? ' [LOCKED]' : '');
    ctx.fillText(`${i + 1}. ${LEVEL_NAMES[i]}${status}`, w/2, y + 20);
  }
}

// --- Main Draw ---
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (gameState === 'menu') {
    drawMenu();
    return;
  }
  if (gameState === 'victory') {
    drawVictory();
    return;
  }
  if (gameState === 'levelSelect') {
    drawLevelSelect();
    return;
  }

  // Camera offset with screen shake
  const camX = camera.x + screenShakeX;
  const camY = camera.y + screenShakeY;

  // Background
  drawBackground(camX, camY);

  // Rising lava (behind platforms)
  drawRisingLava(camX, camY);

  // Hazards (behind platforms for lava)
  for (const h of activeHazards) {
    if (h.type === 'lava') drawHazard(h, camX, camY);
  }

  // Platforms
  for (const p of activePlatforms) {
    drawPlatform(p, camX, camY);
  }

  // Hazards (in front of platforms)
  for (const h of activeHazards) {
    if (h.type !== 'lava') drawHazard(h, camX, camY);
  }

  // Checkpoints
  drawCheckpoints(camX, camY);

  // Finish
  drawFinish(camX, camY);

  // Trails
  drawTrails(camX, camY);

  // Player
  drawPlayer(camX, camY);

  // Particles
  drawParticles(camX, camY);

  // Barry face
  drawBarryFace();

  // Level transition overlay
  if (gameState === 'levelTransition') {
    drawLevelTransition();
  }
}

// --- Game Loop ---
function gameLoop() {
  globalTimer++;
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
