<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SPACE INVADERS</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  canvas {
    display: block;
    margin: 0 auto;
    image-rendering: pixelated;
  }
  #touchLeft, #touchRight, #touchFire {
    display: none;
    position: fixed;
    z-index: 10;
    border: 2px solid rgba(0,255,255,0.3);
    border-radius: 12px;
    background: rgba(0,255,255,0.08);
    color: #0ff;
    font-family: 'Courier New', monospace;
    font-size: 22px;
    font-weight: bold;
    text-align: center;
    line-height: 60px;
  }
  #touchLeft  { left: 10px; bottom: 20px; width: 70px; height: 60px; }
  #touchRight { left: 90px; bottom: 20px; width: 70px; height: 60px; }
  #touchFire  { right: 10px; bottom: 20px; width: 100px; height: 60px; }
  @media (pointer: coarse) {
    #touchLeft, #touchRight, #touchFire { display: block; }
  }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<div id="touchLeft">&larr;</div>
<div id="touchRight">&rarr;</div>
<div id="touchFire">FIRE</div>
<script>
// ═══════════════════════════════════════════════════════════════
// SPACE INVADERS — Neon Cyberpunk Edition
// ═══════════════════════════════════════════════════════════════

const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');

// ── Constants ──────────────────────────────────────────────────
const BASE_W = 800, BASE_H = 600;
const ALIEN_COLS = 11, ALIEN_ROWS = 5;
const SHIELD_COUNT = 4;
const PLAYER_SPEED = 5;
const BULLET_SPEED = 8;
const ALIEN_BULLET_SPEED = 3.5;
const UFO_SPEED = 2.2;
const NEON = {
  cyan:    '#0ff',
  magenta: '#f0f',
  green:   '#0f0',
  yellow:  '#ff0',
  orange:  '#f80',
  red:     '#f44',
  white:   '#fff',
  pink:    '#f6f',
  blue:    '#48f',
};

// ── State ──────────────────────────────────────────────────────
let scale = 1, offsetX = 0, offsetY = 0;
let gameState = 'start'; // start | playing | gameover | waveTransition
let score = 0, highScore = parseInt(localStorage.getItem('si_hi')) || 0;
let lives = 3, wave = 1;
let player, aliens, alienDir, alienDropTarget, alienSpeed, alienSpeedBase;
let alienMoveTimer, alienMoveInterval;
let playerBullets, alienBullets;
let shields, shieldData;
let ufo, ufoTimer, ufoActive;
let particles, explosions;
let stars;
let keys = {};
let lastTime = 0, dt = 0;
let waveTextTimer = 0, waveTextAlpha = 0;
let alienShootTimer = 0, alienShootInterval;
let playerInvincible = 0;
let gameOverTimer = 0;
let frameCount = 0;

// ── Audio Engine ───────────────────────────────────────────────
let audioCtx;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, dur, type = 'square', vol = 0.12, slide = 0) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  if (slide) osc.frequency.exponentialRampToValueAtTime(Math.max(slide, 20), audioCtx.currentTime + dur);
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + dur);
}

function sfxShoot()     { playTone(880, 0.08, 'square', 0.10, 440); }
function sfxAlienHit()  { playTone(220, 0.15, 'square', 0.12, 80); playTone(160, 0.2, 'sawtooth', 0.06, 40); }
function sfxPlayerHit() { playTone(120, 0.4, 'sawtooth', 0.15, 30); playTone(80, 0.5, 'square', 0.08, 20); }
function sfxUfo()       { playTone(400, 0.06, 'sine', 0.05); setTimeout(() => playTone(500, 0.06, 'sine', 0.05), 70); }
function sfxWave()      { playTone(523, 0.12, 'square', 0.08); setTimeout(() => playTone(659, 0.12, 'square', 0.08), 130); setTimeout(() => playTone(784, 0.2, 'square', 0.08), 260); }
function sfxAlienMove() { playTone(80 + (frameCount % 4) * 20, 0.05, 'square', 0.03); }
function sfxUfoScore()  { for (let i = 0; i < 5; i++) setTimeout(() => playTone(300 + i * 80, 0.08, 'sine', 0.06), i * 60); }

// ── Resize ─────────────────────────────────────────────────────
function resize() {
  const dpr = window.devicePixelRatio || 1;
  const w = window.innerWidth, h = window.innerHeight;
  const aspect = BASE_W / BASE_H;
  let cw, ch;
  if (w / h > aspect) { ch = h; cw = h * aspect; }
  else { cw = w; ch = w / aspect; }
  canvas.style.width  = cw + 'px';
  canvas.style.height = ch + 'px';
  canvas.width  = Math.round(cw * dpr);
  canvas.height = Math.round(ch * dpr);
  scale = (cw * dpr) / BASE_W;
  offsetX = 0; offsetY = 0;
  ctx.setTransform(scale, 0, 0, scale, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ── Stars ──────────────────────────────────────────────────────
function makeStars() {
  stars = [];
  for (let i = 0; i < 120; i++) {
    stars.push({
      x: Math.random() * BASE_W,
      y: Math.random() * BASE_H,
      r: Math.random() * 1.5 + 0.3,
      a: Math.random() * 0.6 + 0.2,
      speed: Math.random() * 0.3 + 0.05,
      phase: Math.random() * Math.PI * 2,
    });
  }
}
makeStars();

function drawStars() {
  for (const s of stars) {
    const flicker = 0.5 + 0.5 * Math.sin(frameCount * 0.02 + s.phase);
    ctx.globalAlpha = s.a * flicker;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ── Shield Barriers ────────────────────────────────────────────
const SHIELD_W = 44, SHIELD_H = 34;
const SHIELD_PIXEL = 3;
const SHIELD_COLS = Math.floor(SHIELD_W / SHIELD_PIXEL);
const SHIELD_ROWS = Math.floor(SHIELD_H / SHIELD_PIXEL);

function createShieldShape() {
  const d = [];
  for (let r = 0; r < SHIELD_ROWS; r++) {
    d[r] = [];
    for (let c = 0; c < SHIELD_COLS; c++) {
      const cx = c / SHIELD_COLS - 0.5;
      const cy = r / SHIELD_ROWS;
      // dome top
      const inDome = cy < 0.5 ? (cx * cx + (cy - 0.5) * (cy - 0.5)) < 0.28 : true;
      // cutout at bottom center
      const inCutout = cy > 0.65 && Math.abs(cx) < 0.2;
      d[r][c] = inDome && !inCutout ? 1 : 0;
    }
  }
  return d;
}

function initShields() {
  shields = [];
  shieldData = [];
  const spacing = BASE_W / (SHIELD_COUNT + 1);
  for (let i = 0; i < SHIELD_COUNT; i++) {
    const sx = spacing * (i + 1) - SHIELD_W / 2;
    const sy = BASE_H - 110;
    shields.push({ x: sx, y: sy });
    shieldData.push(createShieldShape());
  }
}

function drawShields() {
  for (let si = 0; si < shields.length; si++) {
    const s = shields[si];
    const d = shieldData[si];
    for (let r = 0; r < SHIELD_ROWS; r++) {
      for (let c = 0; c < SHIELD_COLS; c++) {
        if (d[r][c]) {
          const brightness = d[r][c];
          const g = Math.floor(180 + 75 * brightness);
          ctx.fillStyle = `rgb(0,${g},${Math.floor(g * 0.9)})`;
          ctx.fillRect(s.x + c * SHIELD_PIXEL, s.y + r * SHIELD_PIXEL, SHIELD_PIXEL, SHIELD_PIXEL);
        }
      }
    }
  }
}

function damageShield(si, bx, by, radius, fromTop) {
  const s = shields[si];
  const d = shieldData[si];
  const lc = Math.floor((bx - radius - s.x) / SHIELD_PIXEL);
  const rc = Math.ceil((bx + radius - s.x) / SHIELD_PIXEL);
  const startR = fromTop ? 0 : SHIELD_ROWS - 1;
  const endR   = fromTop ? SHIELD_ROWS : -1;
  const stepR  = fromTop ? 1 : -1;
  let hit = false;
  for (let r = startR; r !== endR; r += stepR) {
    for (let c = Math.max(0, lc); c <= Math.min(SHIELD_COLS - 1, rc); c++) {
      if (d[r][c]) {
        const px = s.x + c * SHIELD_PIXEL + SHIELD_PIXEL / 2;
        const py = s.y + r * SHIELD_PIXEL + SHIELD_PIXEL / 2;
        if (Math.abs(px - bx) < radius + SHIELD_PIXEL && Math.abs(py - by) < radius + SHIELD_PIXEL) {
          d[r][c] = 0;
          hit = true;
        }
      }
    }
  }
  return hit;
}

// ── Player ─────────────────────────────────────────────────────
function initPlayer() {
  player = { x: BASE_W / 2, y: BASE_H - 45, w: 40, h: 16, alive: true };
}

function drawPlayer() {
  if (!player.alive) return;
  const px = player.x, py = player.y;
  const flash = playerInvincible > 0 && Math.floor(playerInvincible * 10) % 2;
  if (flash) return;

  ctx.save();
  // glow
  ctx.shadowColor = NEON.cyan;
  ctx.shadowBlur = 18;
  ctx.fillStyle = NEON.cyan;

  // ship body
  ctx.beginPath();
  ctx.moveTo(px, py - 14);           // tip
  ctx.lineTo(px + 6, py - 6);
  ctx.lineTo(px + 18, py);
  ctx.lineTo(px + 20, py + 6);
  ctx.lineTo(px - 20, py + 6);
  ctx.lineTo(px - 18, py);
  ctx.lineTo(px - 6, py - 6);
  ctx.closePath();
  ctx.fill();

  // cockpit
  ctx.fillStyle = '#0aa';
  ctx.shadowBlur = 0;
  ctx.beginPath();
  ctx.arc(px, py - 4, 4, 0, Math.PI * 2);
  ctx.fill();

  // engine glow
  ctx.fillStyle = NEON.magenta;
  ctx.shadowColor = NEON.magenta;
  ctx.shadowBlur = 10;
  ctx.fillRect(px - 8, py + 6, 4, 3 + Math.random() * 3);
  ctx.fillRect(px + 4, py + 6, 4, 3 + Math.random() * 3);

  ctx.restore();
}

// ── Aliens ─────────────────────────────────────────────────────
function initAliens() {
  aliens = [];
  const startX = 80, startY = 60 + Math.min(wave - 1, 5) * 5;
  const gapX = 48, gapY = 38;
  for (let r = 0; r < ALIEN_ROWS; r++) {
    for (let c = 0; c < ALIEN_COLS; c++) {
      let type; // 0=top(30pts) 1=mid(20pts) 2=bottom(10pts)
      if (r === 0) type = 0;
      else if (r <= 2) type = 1;
      else type = 2;
      aliens.push({
        x: startX + c * gapX,
        y: startY + r * gapY,
        type, alive: true,
        frame: 0,
        r, c,
      });
    }
  }
  alienDir = 1;
  alienSpeedBase = Math.max(0.35, 1.0 - wave * 0.04);
  alienSpeed = alienSpeedBase;
  alienMoveTimer = 0;
  alienMoveInterval = alienSpeedBase;
  alienDropTarget = -1;
  alienShootInterval = Math.max(0.5, 2.0 - wave * 0.15);
  alienShootTimer = alienShootInterval;
}

function aliveAliens() { return aliens.filter(a => a.alive); }

function drawAlienType0(x, y, frame) {
  // Squid-like top alien — 30 pts, magenta/pink
  ctx.save();
  ctx.shadowColor = NEON.magenta;
  ctx.shadowBlur = 10;
  ctx.fillStyle = NEON.magenta;
  // body
  ctx.beginPath();
  ctx.arc(x, y, 8, Math.PI, 0);
  ctx.lineTo(x + 8, y + 4);
  ctx.lineTo(x - 8, y + 4);
  ctx.closePath();
  ctx.fill();
  // tentacles
  const s = frame ? 1 : -1;
  ctx.strokeStyle = NEON.pink;
  ctx.lineWidth = 2;
  for (let i = -2; i <= 2; i++) {
    ctx.beginPath();
    ctx.moveTo(x + i * 3.5, y + 4);
    ctx.lineTo(x + i * 3.5 + s * 2, y + 10);
    ctx.stroke();
  }
  // eyes
  ctx.fillStyle = '#fff';
  ctx.fillRect(x - 4, y - 3, 3, 3);
  ctx.fillRect(x + 1, y - 3, 3, 3);
  ctx.fillStyle = NEON.magenta;
  ctx.fillRect(x - 3, y - 2, 2, 2);
  ctx.fillRect(x + 2, y - 2, 2, 2);
  ctx.restore();
}

function drawAlienType1(x, y, frame) {
  // Crab alien — 20 pts, cyan
  ctx.save();
  ctx.shadowColor = NEON.cyan;
  ctx.shadowBlur = 10;
  ctx.fillStyle = NEON.cyan;
  // body
  ctx.fillRect(x - 9, y - 5, 18, 10);
  ctx.fillRect(x - 6, y - 8, 12, 3);
  // horns
  ctx.fillRect(x - 9, y - 10, 3, 5);
  ctx.fillRect(x + 6, y - 10, 3, 5);
  // legs
  const s = frame ? 3 : -3;
  ctx.fillRect(x - 12, y + 2, 3, 5);
  ctx.fillRect(x + 9, y + 2, 3, 5);
  ctx.fillRect(x - 12 + s, y + 5, 3, 3);
  ctx.fillRect(x + 9 - s, y + 5, 3, 3);
  // eyes
  ctx.fillStyle = '#000';
  ctx.fillRect(x - 5, y - 3, 3, 3);
  ctx.fillRect(x + 2, y - 3, 3, 3);
  ctx.restore();
}

function drawAlienType2(x, y, frame) {
  // Octopus alien — 10 pts, green
  ctx.save();
  ctx.shadowColor = NEON.green;
  ctx.shadowBlur = 10;
  ctx.fillStyle = NEON.green;
  // body
  ctx.beginPath();
  ctx.ellipse(x, y - 2, 10, 7, 0, 0, Math.PI * 2);
  ctx.fill();
  // legs
  const s = frame ? 1 : -1;
  ctx.fillRect(x - 10, y + 3, 4, 3);
  ctx.fillRect(x - 4, y + 3, 4, 5);
  ctx.fillRect(x + 1, y + 3, 4, 5);
  ctx.fillRect(x + 7, y + 3, 4, 3);
  ctx.fillRect(x - 10 + s * 2, y + 6, 3, 3);
  ctx.fillRect(x + 8 - s * 2, y + 6, 3, 3);
  // eyes
  ctx.fillStyle = '#000';
  ctx.fillRect(x - 5, y - 4, 3, 3);
  ctx.fillRect(x + 2, y - 4, 3, 3);
  // mouth
  ctx.fillRect(x - 2, y + 0, 4, 2);
  ctx.restore();
}

function drawAlien(a) {
  if (!a.alive) return;
  const drawFn = [drawAlienType0, drawAlienType1, drawAlienType2][a.type];
  drawFn(a.x, a.y, a.frame);
}

function updateAliens(dt) {
  const alive = aliveAliens();
  if (alive.length === 0) return;

  // Speed up as fewer remain
  const ratio = alive.length / (ALIEN_COLS * ALIEN_ROWS);
  alienMoveInterval = alienSpeedBase * ratio;
  if (alienMoveInterval < 0.05) alienMoveInterval = 0.05;

  alienMoveTimer += dt;
  if (alienMoveTimer >= alienMoveInterval) {
    alienMoveTimer = 0;
    sfxAlienMove();

    // Toggle animation frame
    for (const a of alive) a.frame = 1 - a.frame;

    // Find bounds
    let minX = 9999, maxX = -9999;
    for (const a of alive) {
      if (a.x - 12 < minX) minX = a.x - 12;
      if (a.x + 12 > maxX) maxX = a.x + 12;
    }

    // Move horizontally or drop
    if (alienDropTarget > 0) {
      // dropping
      for (const a of alive) a.y += 12;
      alienDropTarget--;
      if (alienDropTarget === 0) alienDir *= -1;
    } else {
      const step = 8;
      if ((alienDir > 0 && maxX + step > BASE_W - 20) || (alienDir < 0 && minX - step < 20)) {
        alienDropTarget = 1;
        for (const a of alive) a.y += 12;
        alienDir *= -1;
      } else {
        for (const a of alive) a.x += step * alienDir;
      }
    }

    // Check if aliens reached player
    for (const a of alive) {
      if (a.y + 10 >= player.y - 20) {
        gameState = 'gameover';
        gameOverTimer = 3;
        sfxPlayerHit();
      }
    }
  }

  // Alien shooting
  alienShootTimer -= dt;
  if (alienShootTimer <= 0) {
    alienShootTimer = alienShootInterval * (0.6 + Math.random() * 0.8);
    // Pick a random column with aliens and shoot from the lowest one
    const cols = {};
    for (const a of alive) {
      if (!cols[a.c] || a.y > cols[a.c].y) cols[a.c] = a;
    }
    const shooters = Object.values(cols);
    if (shooters.length > 0) {
      const s = shooters[Math.floor(Math.random() * shooters.length)];
      alienBullets.push({ x: s.x, y: s.y + 10, vy: ALIEN_BULLET_SPEED + wave * 0.2 });
    }
  }
}

// ── UFO ────────────────────────────────────────────────────────
function initUfo() {
  ufo = null;
  ufoActive = false;
  ufoTimer = 10 + Math.random() * 15;
}

function spawnUfo() {
  const dir = Math.random() < 0.5 ? 1 : -1;
  ufo = {
    x: dir > 0 ? -30 : BASE_W + 30,
    y: 30,
    dir,
    alive: true,
    scoreText: null,
    scoreTimer: 0,
  };
  ufoActive = true;
}

function updateUfo(dt) {
  if (!ufoActive) {
    ufoTimer -= dt;
    if (ufoTimer <= 0 && gameState === 'playing') spawnUfo();
    return;
  }
  if (!ufo) return;

  if (ufo.alive) {
    ufo.x += ufo.dir * UFO_SPEED * 60 * dt;
    if (ufo.x < -40 || ufo.x > BASE_W + 40) {
      ufoActive = false;
      ufoTimer = 12 + Math.random() * 18;
    }
    // sound
    if (frameCount % 10 === 0) sfxUfo();
  } else {
    ufo.scoreTimer -= dt;
    if (ufo.scoreTimer <= 0) {
      ufoActive = false;
      ufoTimer = 12 + Math.random() * 18;
    }
  }
}

function drawUfo() {
  if (!ufo || !ufoActive) return;
  if (ufo.alive) {
    ctx.save();
    ctx.shadowColor = NEON.red;
    ctx.shadowBlur = 15;
    ctx.fillStyle = NEON.red;
    // dome
    ctx.beginPath();
    ctx.ellipse(ufo.x, ufo.y - 4, 8, 6, 0, Math.PI, 0);
    ctx.fill();
    // body
    ctx.beginPath();
    ctx.ellipse(ufo.x, ufo.y, 18, 6, 0, 0, Math.PI);
    ctx.fill();
    ctx.fillRect(ufo.x - 18, ufo.y - 3, 36, 4);
    // lights
    ctx.fillStyle = NEON.yellow;
    ctx.shadowColor = NEON.yellow;
    for (let i = -2; i <= 2; i++) {
      ctx.beginPath();
      ctx.arc(ufo.x + i * 7, ufo.y + 1, 2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  } else {
    // Show score text
    ctx.save();
    ctx.fillStyle = NEON.yellow;
    ctx.shadowColor = NEON.yellow;
    ctx.shadowBlur = 10;
    ctx.font = 'bold 14px Courier New';
    ctx.textAlign = 'center';
    ctx.globalAlpha = Math.min(1, ufo.scoreTimer * 2);
    ctx.fillText(ufo.scoreText, ufo.x, ufo.y + 4);
    ctx.restore();
  }
}

// ── Bullets ────────────────────────────────────────────────────
function drawPlayerBullets() {
  for (const b of playerBullets) {
    ctx.save();
    ctx.shadowColor = NEON.yellow;
    ctx.shadowBlur = 12;
    // trail
    const grad = ctx.createLinearGradient(b.x, b.y, b.x, b.y + 16);
    grad.addColorStop(0, NEON.yellow);
    grad.addColorStop(1, 'rgba(255,255,0,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(b.x - 1.5, b.y, 3, 16);
    // head
    ctx.fillStyle = '#fff';
    ctx.fillRect(b.x - 1.5, b.y - 2, 3, 4);
    ctx.restore();
  }
}

function drawAlienBullets() {
  for (const b of alienBullets) {
    ctx.save();
    ctx.shadowColor = NEON.red;
    ctx.shadowBlur = 8;
    // zigzag bolt
    ctx.strokeStyle = NEON.red;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(b.x, b.y);
    ctx.lineTo(b.x + 3, b.y + 4);
    ctx.lineTo(b.x - 3, b.y + 8);
    ctx.lineTo(b.x + 2, b.y + 12);
    ctx.stroke();
    ctx.restore();
  }
}

// ── Particles & Explosions ─────────────────────────────────────
function spawnExplosion(x, y, color, count = 15) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 120 + 40;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 0.4 + Math.random() * 0.4,
      maxLife: 0.4 + Math.random() * 0.4,
      color,
      size: Math.random() * 3 + 1.5,
    });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 60 * dt; // gravity
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    const a = p.life / p.maxLife;
    ctx.save();
    ctx.globalAlpha = a;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    ctx.restore();
  }
}

// ── Collision ──────────────────────────────────────────────────
function rectHit(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

function checkCollisions() {
  // Player bullets vs aliens
  for (let bi = playerBullets.length - 1; bi >= 0; bi--) {
    const b = playerBullets[bi];
    let hit = false;
    for (const a of aliens) {
      if (!a.alive) continue;
      if (Math.abs(b.x - a.x) < 14 && Math.abs(b.y - a.y) < 12) {
        a.alive = false;
        hit = true;
        const pts = [30, 20, 10][a.type];
        score += pts;
        if (score > highScore) highScore = score;
        const colors = [NEON.magenta, NEON.cyan, NEON.green];
        spawnExplosion(a.x, a.y, colors[a.type], 18);
        sfxAlienHit();
        break;
      }
    }
    // Player bullet vs UFO
    if (!hit && ufo && ufo.alive && ufoActive) {
      if (Math.abs(b.x - ufo.x) < 20 && Math.abs(b.y - ufo.y) < 8) {
        hit = true;
        const ufoScores = [50, 100, 150, 200, 300];
        const pts = ufoScores[Math.floor(Math.random() * ufoScores.length)];
        score += pts;
        if (score > highScore) highScore = score;
        ufo.alive = false;
        ufo.scoreText = '+' + pts;
        ufo.scoreTimer = 1.5;
        spawnExplosion(ufo.x, ufo.y, NEON.red, 25);
        sfxUfoScore();
      }
    }
    // Player bullet vs shields
    if (!hit) {
      for (let si = 0; si < shields.length; si++) {
        const s = shields[si];
        if (b.x > s.x - 4 && b.x < s.x + SHIELD_W + 4 && b.y > s.y - 4 && b.y < s.y + SHIELD_H + 4) {
          if (damageShield(si, b.x, b.y, 5, false)) {
            hit = true;
            break;
          }
        }
      }
    }
    if (hit) playerBullets.splice(bi, 1);
  }

  // Alien bullets vs player
  for (let bi = alienBullets.length - 1; bi >= 0; bi--) {
    const b = alienBullets[bi];
    // vs shields
    let shieldHit = false;
    for (let si = 0; si < shields.length; si++) {
      const s = shields[si];
      if (b.x > s.x - 4 && b.x < s.x + SHIELD_W + 4 && b.y > s.y - 4 && b.y < s.y + SHIELD_H + 4) {
        if (damageShield(si, b.x, b.y, 5, true)) {
          shieldHit = true;
          alienBullets.splice(bi, 1);
          break;
        }
      }
    }
    if (shieldHit) continue;

    // vs player
    if (player.alive && playerInvincible <= 0) {
      if (Math.abs(b.x - player.x) < 18 && Math.abs(b.y - player.y) < 12) {
        alienBullets.splice(bi, 1);
        hitPlayer();
        continue;
      }
    }
  }

  // Aliens vs shields (when aliens descend into shields)
  for (const a of aliens) {
    if (!a.alive) continue;
    for (let si = 0; si < shields.length; si++) {
      const s = shields[si];
      if (Math.abs(a.x - (s.x + SHIELD_W/2)) < SHIELD_W/2 + 12 && Math.abs(a.y - (s.y + SHIELD_H/2)) < SHIELD_H/2 + 10) {
        damageShield(si, a.x, a.y, 14, true);
      }
    }
  }
}

function hitPlayer() {
  lives--;
  sfxPlayerHit();
  spawnExplosion(player.x, player.y, NEON.cyan, 25);
  if (lives <= 0) {
    player.alive = false;
    gameState = 'gameover';
    gameOverTimer = 3;
  } else {
    playerInvincible = 2.0;
  }
}

// ── Game Init ──────────────────────────────────────────────────
function startGame() {
  score = 0; lives = 3; wave = 1;
  initPlayer();
  initAliens();
  initShields();
  initUfo();
  playerBullets = [];
  alienBullets = [];
  particles = [];
  playerInvincible = 0;
  waveTextTimer = 2.5;
  gameState = 'playing';
}

function nextWave() {
  wave++;
  initAliens();
  initUfo();
  playerBullets = [];
  alienBullets = [];
  playerInvincible = 1.0;
  waveTextTimer = 2.5;
  gameState = 'playing';
  sfxWave();
}

// ── HUD ────────────────────────────────────────────────────────
function drawHUD() {
  ctx.save();
  ctx.shadowBlur = 0;

  // Score
  ctx.fillStyle = NEON.white;
  ctx.font = 'bold 16px Courier New';
  ctx.textAlign = 'left';
  ctx.fillText('SCORE', 15, 20);
  ctx.fillStyle = NEON.green;
  ctx.fillText(score.toString().padStart(6, '0'), 15, 38);

  // High Score
  ctx.fillStyle = NEON.white;
  ctx.textAlign = 'center';
  ctx.fillText('HI-SCORE', BASE_W / 2, 20);
  ctx.fillStyle = NEON.yellow;
  ctx.fillText(highScore.toString().padStart(6, '0'), BASE_W / 2, 38);

  // Wave
  ctx.fillStyle = NEON.white;
  ctx.textAlign = 'right';
  ctx.fillText('WAVE', BASE_W - 15, 20);
  ctx.fillStyle = NEON.cyan;
  ctx.fillText(wave.toString(), BASE_W - 15, 38);

  // Lives
  ctx.textAlign = 'left';
  for (let i = 0; i < lives; i++) {
    const lx = 20 + i * 30;
    const ly = BASE_H - 18;
    ctx.fillStyle = NEON.cyan;
    ctx.shadowColor = NEON.cyan;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.moveTo(lx, ly - 8);
    ctx.lineTo(lx + 8, ly);
    ctx.lineTo(lx + 10, ly + 3);
    ctx.lineTo(lx - 10, ly + 3);
    ctx.lineTo(lx - 8, ly);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // Wave text
  if (waveTextTimer > 0) {
    const alpha = waveTextTimer > 2 ? (2.5 - waveTextTimer) * 2 : Math.min(1, waveTextTimer);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = NEON.cyan;
    ctx.shadowColor = NEON.cyan;
    ctx.shadowBlur = 20;
    ctx.font = 'bold 40px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText(`WAVE ${wave}`, BASE_W / 2, BASE_H / 2 - 40);
    ctx.font = '18px Courier New';
    ctx.fillStyle = NEON.yellow;
    ctx.shadowColor = NEON.yellow;
    ctx.fillText('GET READY', BASE_W / 2, BASE_H / 2);
    ctx.globalAlpha = 1;
  }

  // Bottom line
  ctx.strokeStyle = NEON.green;
  ctx.shadowBlur = 0;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, BASE_H - 55);
  ctx.lineTo(BASE_W, BASE_H - 55);
  ctx.stroke();

  ctx.restore();
}

// ── Screens ────────────────────────────────────────────────────
function drawStartScreen() {
  drawStars();

  ctx.save();

  // Title
  ctx.fillStyle = NEON.cyan;
  ctx.shadowColor = NEON.cyan;
  ctx.shadowBlur = 25;
  ctx.font = 'bold 50px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('SPACE', BASE_W / 2, 150);
  ctx.fillStyle = NEON.magenta;
  ctx.shadowColor = NEON.magenta;
  ctx.fillText('INVADERS', BASE_W / 2, 200);

  // Subtitle
  ctx.shadowBlur = 8;
  ctx.font = '14px Courier New';
  ctx.fillStyle = NEON.yellow;
  ctx.shadowColor = NEON.yellow;
  ctx.fillText('NEON CYBERPUNK EDITION', BASE_W / 2, 230);

  // Score table
  ctx.font = '16px Courier New';
  ctx.shadowBlur = 5;
  const tableY = 280;
  ctx.fillStyle = NEON.white;
  ctx.fillText('= SCORE ADVANCE TABLE =', BASE_W / 2, tableY);

  // Draw sample aliens
  drawAlienType0(BASE_W / 2 - 60, tableY + 35, Math.floor(frameCount / 30) % 2);
  ctx.fillStyle = NEON.white;
  ctx.shadowBlur = 0;
  ctx.font = '14px Courier New';
  ctx.fillText('= 30 PTS', BASE_W / 2 + 20, tableY + 39);

  drawAlienType1(BASE_W / 2 - 60, tableY + 70, Math.floor(frameCount / 30) % 2);
  ctx.fillStyle = NEON.white;
  ctx.shadowBlur = 0;
  ctx.fillText('= 20 PTS', BASE_W / 2 + 20, tableY + 74);

  drawAlienType2(BASE_W / 2 - 60, tableY + 105, Math.floor(frameCount / 30) % 2);
  ctx.fillStyle = NEON.white;
  ctx.shadowBlur = 0;
  ctx.fillText('= 10 PTS', BASE_W / 2 + 20, tableY + 109);

  // UFO
  ctx.fillStyle = NEON.red;
  ctx.shadowColor = NEON.red;
  ctx.shadowBlur = 8;
  ctx.fillText('?', BASE_W / 2 - 60, tableY + 144);
  ctx.fillStyle = NEON.white;
  ctx.shadowBlur = 0;
  ctx.fillText('= MYSTERY', BASE_W / 2 + 20, tableY + 144);

  // Start prompt
  const blink = Math.sin(frameCount * 0.05) > 0;
  if (blink) {
    ctx.fillStyle = NEON.green;
    ctx.shadowColor = NEON.green;
    ctx.shadowBlur = 12;
    ctx.font = 'bold 18px Courier New';
    ctx.fillText('PRESS SPACE OR TAP TO START', BASE_W / 2, 510);
  }

  // High score
  ctx.font = '14px Courier New';
  ctx.fillStyle = NEON.yellow;
  ctx.shadowColor = NEON.yellow;
  ctx.shadowBlur = 5;
  ctx.fillText(`HIGH SCORE: ${highScore}`, BASE_W / 2, 545);

  // Controls
  ctx.font = '12px Courier New';
  ctx.fillStyle = '#888';
  ctx.shadowBlur = 0;
  ctx.fillText('ARROWS/A,D = MOVE  |  SPACE = FIRE', BASE_W / 2, 570);

  ctx.restore();
}

function drawGameOverScreen() {
  ctx.save();

  // Overlay
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(0, 0, BASE_W, BASE_H);

  ctx.textAlign = 'center';

  // Game Over text
  ctx.fillStyle = NEON.red;
  ctx.shadowColor = NEON.red;
  ctx.shadowBlur = 30;
  ctx.font = 'bold 50px Courier New';
  ctx.fillText('GAME OVER', BASE_W / 2, BASE_H / 2 - 40);

  // Stats
  ctx.shadowBlur = 8;
  ctx.font = '20px Courier New';
  ctx.fillStyle = NEON.white;
  ctx.fillText(`SCORE: ${score}`, BASE_W / 2, BASE_H / 2 + 20);
  ctx.fillStyle = NEON.yellow;
  ctx.fillText(`WAVE: ${wave}`, BASE_W / 2, BASE_H / 2 + 50);

  if (score >= highScore && score > 0) {
    ctx.fillStyle = NEON.green;
    ctx.shadowColor = NEON.green;
    ctx.shadowBlur = 15;
    ctx.font = 'bold 18px Courier New';
    ctx.fillText('NEW HIGH SCORE!', BASE_W / 2, BASE_H / 2 + 85);
  }

  // Restart prompt
  if (gameOverTimer <= 0) {
    const blink = Math.sin(frameCount * 0.05) > 0;
    if (blink) {
      ctx.fillStyle = NEON.cyan;
      ctx.shadowColor = NEON.cyan;
      ctx.shadowBlur = 12;
      ctx.font = '16px Courier New';
      ctx.fillText('PRESS SPACE OR TAP TO PLAY AGAIN', BASE_W / 2, BASE_H / 2 + 125);
    }
  }

  ctx.restore();
}

// ── Scanline effect ────────────────────────────────────────────
function drawScanlines() {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.06)';
  for (let y = 0; y < BASE_H; y += 3) {
    ctx.fillRect(0, y, BASE_W, 1);
  }
  ctx.restore();
}

// ── Input ──────────────────────────────────────────────────────
let touchState = { left: false, right: false, fire: false };

document.addEventListener('keydown', e => {
  keys[e.code] = true;
  ensureAudio();
  if (e.code === 'Space') {
    e.preventDefault();
    if (gameState === 'start') startGame();
    else if (gameState === 'gameover' && gameOverTimer <= 0) startGame();
  }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// Touch controls
const tl = document.getElementById('touchLeft');
const tr = document.getElementById('touchRight');
const tf = document.getElementById('touchFire');

function addTouch(el, key) {
  el.addEventListener('touchstart', e => { e.preventDefault(); ensureAudio(); touchState[key] = true;
    if (key === 'fire') {
      if (gameState === 'start') startGame();
      else if (gameState === 'gameover' && gameOverTimer <= 0) startGame();
    }
  });
  el.addEventListener('touchend', e => { e.preventDefault(); touchState[key] = false; });
  el.addEventListener('touchcancel', e => { touchState[key] = false; });
}
addTouch(tl, 'left');
addTouch(tr, 'right');
addTouch(tf, 'fire');

// Also handle tap on canvas for start/gameover
canvas.addEventListener('touchstart', e => {
  ensureAudio();
  if (gameState === 'start') startGame();
  else if (gameState === 'gameover' && gameOverTimer <= 0) startGame();
});
canvas.addEventListener('click', () => {
  ensureAudio();
});

// ── Shoot cooldown ─────────────────────────────────────────────
let shootCooldown = 0;
const SHOOT_RATE = 0.35;

// ── Main Loop ──────────────────────────────────────────────────
function gameLoop(time) {
  requestAnimationFrame(gameLoop);
  if (!lastTime) { lastTime = time; return; }
  dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;
  frameCount++;

  ctx.clearRect(0, 0, BASE_W, BASE_H);

  // Background
  ctx.fillStyle = '#050510';
  ctx.fillRect(0, 0, BASE_W, BASE_H);

  if (gameState === 'start') {
    drawStartScreen();
    drawScanlines();
    return;
  }

  drawStars();

  if (gameState === 'playing' || gameState === 'gameover') {
    // Update player
    if (gameState === 'playing' && player.alive) {
      let moveDir = 0;
      if (keys['ArrowLeft'] || keys['KeyA'] || touchState.left) moveDir = -1;
      if (keys['ArrowRight'] || keys['KeyD'] || touchState.right) moveDir = 1;
      player.x += moveDir * PLAYER_SPEED * 60 * dt;
      player.x = Math.max(22, Math.min(BASE_W - 22, player.x));

      // Shooting
      shootCooldown -= dt;
      if ((keys['Space'] || touchState.fire) && shootCooldown <= 0 && playerBullets.length < 2) {
        playerBullets.push({ x: player.x, y: player.y - 16 });
        shootCooldown = SHOOT_RATE;
        sfxShoot();
      }

      if (playerInvincible > 0) playerInvincible -= dt;
    }

    // Update bullets
    for (let i = playerBullets.length - 1; i >= 0; i--) {
      playerBullets[i].y -= BULLET_SPEED * 60 * dt;
      if (playerBullets[i].y < -10) playerBullets.splice(i, 1);
    }
    for (let i = alienBullets.length - 1; i >= 0; i--) {
      alienBullets[i].y += alienBullets[i].vy * 60 * dt;
      if (alienBullets[i].y > BASE_H + 10) alienBullets.splice(i, 1);
    }

    // Update aliens
    if (gameState === 'playing') {
      updateAliens(dt);
      updateUfo(dt);
      if (waveTextTimer > 0) waveTextTimer -= dt;
    }

    // Collisions
    if (gameState === 'playing') checkCollisions();

    // Check wave clear
    if (gameState === 'playing' && aliveAliens().length === 0) {
      nextWave();
    }

    // Particles
    updateParticles(dt);

    // Game over timer
    if (gameState === 'gameover') {
      gameOverTimer -= dt;
      if (gameOverTimer < 0) gameOverTimer = 0;
      // Save high score
      localStorage.setItem('si_hi', highScore.toString());
    }

    // ── Draw everything ──
    drawShields();
    for (const a of aliens) drawAlien(a);
    drawUfo();
    drawPlayer();
    drawPlayerBullets();
    drawAlienBullets();
    drawParticles();
    drawHUD();

    if (gameState === 'gameover') drawGameOverScreen();
  }

  drawScanlines();
}

requestAnimationFrame(gameLoop);
</script>
