<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOID ARCADE — Unblocked Games</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        background: #0a0a0f;
        color: #fff;
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        min-height: 100vh;
        overflow-x: hidden;
    }
    body::before {
        content: '';
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background:
            linear-gradient(rgba(0,255,204,0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0,255,204,0.03) 1px, transparent 1px);
        background-size: 50px 50px;
        animation: gridScroll 20s linear infinite;
        pointer-events: none;
        z-index: 0;
    }
    @keyframes gridScroll {
        0% { transform: translate(0, 0); }
        100% { transform: translate(50px, 50px); }
    }
    body::after {
        content: '';
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
        pointer-events: none;
        z-index: 999;
    }
    .container {
        position: relative;
        z-index: 1;
        max-width: 1300px;
        margin: 0 auto;
        padding: 20px 20px;
    }
    header { text-align: center; padding: 30px 0 20px; }
    .logo {
        font-family: 'Orbitron', sans-serif;
        font-size: clamp(32px, 6vw, 64px);
        font-weight: 900;
        letter-spacing: 8px;
        background: linear-gradient(135deg, #00ffcc, #ff0055, #aa00ff, #00ffcc);
        background-size: 300% 300%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: gradientShift 4s ease infinite;
        filter: drop-shadow(0 0 30px rgba(0,255,204,0.3));
    }
    @keyframes gradientShift {
        0%, 100% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
    }
    .subtitle { font-size: clamp(11px, 1.8vw, 16px); color: #666; letter-spacing: 10px; margin-top: 6px; }
    .game-count { margin-top: 10px; font-size: 13px; color: #00ffcc; opacity: 0.7; }
    .search-bar { max-width: 500px; margin: 20px auto 25px; position: relative; }
    .search-bar input {
        width: 100%; padding: 12px 18px 12px 42px;
        background: rgba(255,255,255,0.04); border: 1px solid rgba(0,255,204,0.15);
        border-radius: 12px; color: #fff; font-family: 'Share Tech Mono', monospace;
        font-size: 14px; outline: none; transition: all 0.3s;
    }
    .search-bar input:focus { border-color: rgba(0,255,204,0.4); background: rgba(255,255,255,0.06); box-shadow: 0 0 20px rgba(0,255,204,0.1); }
    .search-bar input::placeholder { color: #555; }
    .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #555; font-size: 16px; }
    .tags { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 25px; }
    .tag {
        padding: 6px 14px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.1);
        background: rgba(255,255,255,0.03); font-size: 12px; color: #888;
        cursor: pointer; transition: all 0.3s; user-select: none;
    }
    .tag:hover, .tag.active { border-color: #00ffcc; color: #00ffcc; background: rgba(0,255,204,0.08); }
    .games-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 16px;
    }
    .game-card {
        position: relative; background: rgba(255,255,255,0.02);
        border: 1px solid rgba(255,255,255,0.06); border-radius: 14px;
        overflow: hidden; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        text-decoration: none; color: inherit; display: block;
    }
    .game-card:hover {
        transform: translateY(-4px); border-color: var(--accent);
        box-shadow: 0 8px 30px rgba(0,0,0,0.5), 0 0 20px color-mix(in srgb, var(--accent) 15%, transparent);
    }
    .card-banner {
        height: 110px; background: var(--bg);
        display: flex; align-items: center; justify-content: center;
        position: relative; overflow: hidden;
    }
    .card-banner::after {
        content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 40px;
        background: linear-gradient(transparent, rgba(10,10,15,0.95));
    }
    .card-icon { font-size: 42px; z-index: 1; filter: drop-shadow(0 0 15px var(--accent)); }
    .card-body { padding: 12px 14px 14px; }
    .card-title {
        font-family: 'Orbitron', sans-serif; font-size: 13px; font-weight: 700;
        color: var(--accent); margin-bottom: 4px; letter-spacing: 0.5px;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-desc { font-size: 11px; color: #666; line-height: 1.4; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-tags { display: flex; gap: 5px; flex-wrap: wrap; }
    .card-tag { padding: 2px 8px; border-radius: 6px; font-size: 10px; background: rgba(255,255,255,0.04); color: #777; border: 1px solid rgba(255,255,255,0.05); }
    .game-card.featured { grid-column: 1 / -1; }
    .game-card.featured .card-banner { height: 180px; }
    .game-card.featured .card-icon { font-size: 64px; }
    .game-card.featured .card-title { font-size: 20px; }
    .featured-badge {
        position: absolute; top: 10px; right: 10px; padding: 3px 10px;
        background: linear-gradient(135deg, #ff0055, #aa00ff); border-radius: 6px;
        font-size: 10px; font-weight: 700; letter-spacing: 2px; z-index: 2;
        font-family: 'Orbitron', sans-serif;
    }
    .play-btn {
        display: inline-block; padding: 5px 16px; border: 1px solid var(--accent);
        border-radius: 6px; color: var(--accent); font-family: 'Orbitron', sans-serif;
        font-size: 10px; font-weight: 700; letter-spacing: 2px; transition: all 0.3s; margin-top: 4px;
    }
    .game-card:hover .play-btn { background: var(--accent); color: #000; }
    footer { text-align: center; padding: 40px 0 25px; color: #333; font-size: 12px; }
    .no-results { text-align: center; padding: 60px 20px; color: #444; font-size: 16px; display: none; }
    /* Game page overlay - Classroom 6x style */
    #game-overlay {
        display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        background: #0a0a0f; z-index: 10000; overflow-y: auto;
    }
    .game-page-header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 12px 20px; background: rgba(0,0,0,0.6);
        border-bottom: 1px solid rgba(0,255,204,0.1);
    }
    .game-page-header .back-btn {
        padding: 8px 16px; background: rgba(255,255,255,0.05); border: 1px solid #00ffcc;
        color: #00ffcc; font-family: 'Orbitron', sans-serif; font-size: 11px;
        cursor: pointer; border-radius: 6px; transition: all 0.2s; letter-spacing: 1px;
    }
    .game-page-header .back-btn:hover { background: #00ffcc; color: #000; }
    .game-page-title {
        font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 700;
        color: #fff; letter-spacing: 2px;
    }
    .game-page-actions { display: flex; gap: 10px; }
    .game-page-actions button {
        padding: 8px 18px; border-radius: 6px; font-family: 'Orbitron', sans-serif;
        font-size: 11px; font-weight: 700; cursor: pointer; transition: all 0.2s; letter-spacing: 1px;
    }
    .btn-fullscreen {
        background: rgba(255,255,255,0.05); border: 1px solid #ff8800; color: #ff8800;
    }
    .btn-fullscreen:hover { background: #ff8800; color: #000; }
    .game-frame-container {
        width: 100%; height: calc(100vh - 56px); position: relative;
    }
    .game-frame-container iframe { width: 100%; height: 100%; border: none; }
    @media (max-width: 600px) {
        .games-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
        .game-card.featured { grid-column: 1 / -1; }
        .card-banner { height: 90px; }
    }
    .game-card { opacity: 0; animation: fadeUp 0.4s ease forwards; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>

const grid = document.getElementById('grid');
const search = document.getElementById('search');
const noResults = document.getElementById('no-results');
const countEl = document.getElementById('game-count');
const overlay = document.getElementById('game-overlay');
const gameFrame = document.getElementById('game-frame');
let activeTag = 'all';
let currentGameUrl = '';

function openGame(url, title) {
    currentGameUrl = url;
    gameFrame.src = url;
    document.getElementById('game-page-title').textContent = title || '';
    overlay.style.display = 'block';
    document.body.style.overflow = 'hidden';
}
function closeGame() {
    overlay.style.display = 'none';
    gameFrame.src = '';
    currentGameUrl = '';
    document.body.style.overflow = '';
}
function openFullscreen() {
    if (currentGameUrl) window.open(currentGameUrl, '_blank');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeGame(); });

function renderGames(filter = '', tag = 'all') {
    grid.innerHTML = '';
    const filtered = GAMES.filter(g => {
        const matchSearch = !filter || g.title.toLowerCase().includes(filter) || g.desc.toLowerCase().includes(filter) || (g.tags && g.tags.some(t => t.includes(filter)));
        const matchTag = tag === 'all' || (g.tags && g.tags.includes(tag));
        return matchSearch && matchTag;
    });
    noResults.style.display = filtered.length === 0 ? 'block' : 'none';
    countEl.textContent = filtered.length + ' GAME' + (filtered.length !== 1 ? 'S' : '') + ' AVAILABLE';

    filtered.forEach((g, i) => {
        const card = document.createElement(g.embed ? 'div' : 'a');
        if (g.href) card.href = g.href;
        card.className = 'game-card' + (g.featured ? ' featured' : '');
        card.style.setProperty('--accent', g.accent);
        card.style.setProperty('--bg', g.bg);
        card.style.animationDelay = Math.min(i * 0.02, 0.5) + 's';
        if (g.embed && g.direct) card.onclick = () => window.open(g.embed, '_blank');
        else if (g.embed) card.onclick = () => openGame(g.embed, g.title);

        card.innerHTML = `
            <div class="card-banner" style="background:${g.bg}">
                ${g.featured ? '<span class="featured-badge">FEATURED</span>' : ''}
                <span class="card-icon">${g.icon}</span>
            </div>
            <div class="card-body">
                <div class="card-title">${g.title}</div>
                <div class="card-desc">${g.desc}</div>
                <div class="card-tags">${(g.tags||[]).map(t => `<span class="card-tag">${t}</span>`).join('')}</div>
                <span class="play-btn">PLAY</span>
            </div>
        `;
        grid.appendChild(card);
    });
}

search.addEventListener('input', e => renderGames(e.target.value.toLowerCase(), activeTag));
document.getElementById('tags').addEventListener('click', e => {
    if (e.target.classList.contains('tag')) {
        document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
        e.target.classList.add('active');
        activeTag = e.target.dataset.tag;
        renderGames(search.value.toLowerCase(), activeTag);
    }
});
renderGames();
