<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOID ARCADE — Unblocked Games</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        background: #06060c;
        color: #fff;
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        min-height: 100vh;
        overflow-x: hidden;
        scroll-behavior: smooth;
    }
    #bg-canvas {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        z-index: 0; pointer-events: none;
    }
    body::after {
        content: '';
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px);
        pointer-events: none; z-index: 999;
    }
    .container {
        position: relative; z-index: 1;
        max-width: 1400px; margin: 0 auto; padding: 16px 20px;
    }
    header { text-align: center; padding: 24px 0 16px; }
    .logo {
        font-family: 'Orbitron', sans-serif;
        font-size: clamp(36px, 7vw, 72px);
        font-weight: 900; letter-spacing: 10px;
        background: linear-gradient(135deg, #00ffcc, #ff0055, #aa00ff, #00ffcc);
        background-size: 300% 300%;
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        animation: gradientShift 3s ease infinite, logoGlow 2s ease-in-out infinite;
        filter: drop-shadow(0 0 40px rgba(0,255,204,0.4));
        text-shadow: none;
    }
    @keyframes gradientShift { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
    @keyframes logoGlow {
        0%, 100% { filter: drop-shadow(0 0 40px rgba(0,255,204,0.4)); }
        50% { filter: drop-shadow(0 0 60px rgba(0,255,204,0.7)) drop-shadow(0 0 100px rgba(170,0,255,0.3)); }
    }
    .subtitle { font-size: clamp(10px, 1.6vw, 14px); color: #555; letter-spacing: 12px; margin-top: 4px; text-transform: uppercase; }
    .game-count { margin-top: 8px; font-size: 13px; color: #00ffcc; opacity: 0.6; letter-spacing: 3px; }
    .search-bar { max-width: 520px; margin: 16px auto 20px; position: relative; }
    .search-bar input {
        width: 100%; padding: 13px 18px 13px 44px;
        background: rgba(255,255,255,0.03); border: 1px solid rgba(0,255,204,0.12);
        border-radius: 14px; color: #fff; font-family: 'Share Tech Mono', monospace;
        font-size: 14px; outline: none; transition: all 0.3s;
        backdrop-filter: blur(10px);
    }
    .search-bar input:focus { border-color: rgba(0,255,204,0.7); background: rgba(255,255,255,0.06); box-shadow: 0 0 30px rgba(0,255,204,0.2), 0 0 60px rgba(0,255,204,0.1), inset 0 0 15px rgba(0,255,204,0.05); }
    .search-bar input::placeholder { color: #444; }
    .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #444; font-size: 16px; }
    .tags { display: flex; justify-content: center; gap: 7px; flex-wrap: wrap; margin-bottom: 22px; padding: 0 10px; }
    .tag {
        padding: 5px 13px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.08);
        background: rgba(255,255,255,0.02); font-size: 11px; color: #666;
        cursor: pointer; transition: all 0.3s; user-select: none; letter-spacing: 0.5px;
        backdrop-filter: blur(5px);
    }
    .tag:hover { border-color: rgba(0,255,204,0.3); color: #aaa; }
    .tag.active { border-color: #00ffcc; color: #00ffcc; background: rgba(0,255,204,0.08); box-shadow: 0 0 12px rgba(0,255,204,0.15); }
    .tag .tag-count { font-size: 9px; opacity: 0.5; margin-left: 4px; }
    .tag.tag-no-ads { border-color: rgba(0,200,80,0.4); color: #00cc55; }
    .tag.tag-no-ads:hover { border-color: rgba(0,200,80,0.6); color: #00ff66; }
    .tag.tag-no-ads.active { border-color: #00ff66; color: #00ff66; background: rgba(0,255,100,0.1); box-shadow: 0 0 12px rgba(0,255,100,0.2); }
    .games-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 14px;
    }
    .game-card {
        position: relative; background: rgba(255,255,255,0.02);
        border: 1px solid rgba(255,255,255,0.05); border-radius: 12px;
        overflow: hidden; cursor: pointer; transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        text-decoration: none; color: inherit; display: block;
        backdrop-filter: blur(5px);
    }
    .game-card:hover {
        transform: translateY(-5px) scale(1.01);
        border-color: var(--accent);
        box-shadow: 0 10px 40px rgba(0,0,0,0.6), 0 0 25px color-mix(in srgb, var(--accent) 18%, transparent);
    }
    .game-card:hover .card-banner::before {
        opacity: 1;
    }
    .card-banner {
        height: 100px; background: var(--bg);
        display: flex; align-items: center; justify-content: center;
        position: relative; overflow: hidden;
    }
    .card-banner::before {
        content: ''; position: absolute; inset: 0;
        background: radial-gradient(circle at 50% 80%, color-mix(in srgb, var(--accent) 15%, transparent), transparent 70%);
        opacity: 0; transition: opacity 0.4s;
    }
    .card-banner::after {
        content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 35px;
        background: linear-gradient(transparent, rgba(6,6,12,0.95));
    }
    .card-icon { font-size: 38px; z-index: 1; filter: drop-shadow(0 0 12px var(--accent)); transition: transform 0.3s; }
    .game-card:hover .card-icon { transform: scale(1.15); }
    .card-body { padding: 10px 12px 12px; }
    .card-title {
        font-family: 'Orbitron', sans-serif; font-size: 11px; font-weight: 700;
        color: var(--accent); margin-bottom: 3px; letter-spacing: 0.5px;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-desc { font-size: 10px; color: #555; line-height: 1.35; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-tags { display: flex; gap: 4px; flex-wrap: wrap; }
    .card-tag { padding: 2px 7px; border-radius: 5px; font-size: 9px; background: rgba(255,255,255,0.03); color: #555; border: 1px solid rgba(255,255,255,0.04); }
    .play-btn {
        display: inline-block; padding: 4px 14px; border: 1px solid var(--accent);
        border-radius: 5px; color: var(--accent); font-family: 'Orbitron', sans-serif;
        font-size: 9px; font-weight: 700; letter-spacing: 2px; transition: all 0.3s; margin-top: 4px;
    }
    .game-card:hover .play-btn { background: var(--accent); color: #000; box-shadow: 0 0 15px color-mix(in srgb, var(--accent) 30%, transparent); }
    .game-card.featured { grid-column: 1 / -1; }
    .game-card.featured .card-banner { height: 160px; }
    .game-card.featured .card-icon { font-size: 56px; }
    .game-card.featured .card-title { font-size: 18px; }
    .game-card.featured .card-desc { font-size: 12px; -webkit-line-clamp: 3; }
    .featured-badge {
        position: absolute; top: 10px; right: 10px; padding: 3px 10px;
        background: linear-gradient(135deg, #ff0055, #aa00ff); border-radius: 6px;
        font-size: 9px; font-weight: 700; letter-spacing: 2px; z-index: 2;
        font-family: 'Orbitron', sans-serif; box-shadow: 0 0 20px rgba(255,0,85,0.4);
    }
    .new-badge {
        position: absolute; top: 8px; left: 8px; padding: 2px 8px;
        background: linear-gradient(135deg, #00ffcc, #00aa88); border-radius: 4px;
        font-size: 8px; font-weight: 700; letter-spacing: 1px; z-index: 2; color: #000;
        font-family: 'Orbitron', sans-serif;
    }
    footer { text-align: center; padding: 35px 0 20px; color: #282828; font-size: 11px; letter-spacing: 2px; }
    .no-results { text-align: center; padding: 60px 20px; color: #333; font-size: 15px; display: none; letter-spacing: 1px; }
    /* Game overlay - Classroom 6x style */
    #game-overlay {
        display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        background: #06060c; z-index: 10000;
    }
    .game-page-header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 10px 20px; background: rgba(0,0,0,0.7);
        border-bottom: 1px solid rgba(0,255,204,0.08);
        backdrop-filter: blur(10px);
    }
    .game-page-header .back-btn {
        padding: 7px 14px; background: rgba(255,255,255,0.04); border: 1px solid #00ffcc;
        color: #00ffcc; font-family: 'Orbitron', sans-serif; font-size: 10px;
        cursor: pointer; border-radius: 6px; transition: all 0.2s; letter-spacing: 1px;
    }
    .game-page-header .back-btn:hover { background: #00ffcc; color: #000; }
    .game-page-title {
        font-family: 'Orbitron', sans-serif; font-size: 16px; font-weight: 700;
        color: #fff; letter-spacing: 2px;
    }
    .game-page-actions { display: flex; gap: 8px; }
    .game-page-actions button {
        padding: 7px 16px; border-radius: 6px; font-family: 'Orbitron', sans-serif;
        font-size: 10px; font-weight: 700; cursor: pointer; transition: all 0.2s; letter-spacing: 1px;
    }
    .btn-fullscreen { background: rgba(255,255,255,0.04); border: 1px solid #ff8800; color: #ff8800; }
    .btn-fullscreen:hover { background: #ff8800; color: #000; }
    .game-frame-container { width: 100%; height: calc(100vh - 50px); }
    .game-frame-container iframe { width: 100%; height: 100%; border: none; }
    #back-top {
        position: fixed; bottom: 20px; right: 20px; z-index: 5000;
        width: 40px; height: 40px; border-radius: 50%; border: 1px solid rgba(0,255,204,0.2);
        background: rgba(0,0,0,0.6); color: #00ffcc; font-size: 18px;
        cursor: pointer; display: none; align-items: center; justify-content: center;
        backdrop-filter: blur(10px); transition: all 0.3s;
    }
    #back-top:hover { background: rgba(0,255,204,0.1); border-color: #00ffcc; }
    @media (max-width: 700px) {
        .games-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        .game-card.featured { grid-column: 1 / -1; }
        .card-banner { height: 80px; }
        .card-icon { font-size: 30px; }
        .game-page-title { font-size: 12px; }
    }
    .game-card { opacity: 0; animation: fadeUp 0.35s ease forwards; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    /* Featured card animated gradient border pulse */
    .game-card.featured {
        border: none;
        background: linear-gradient(#06060c, #06060c) padding-box,
                    linear-gradient(135deg, #00ffcc, #ff0055, #aa00ff, #00ffcc) border-box;
        border: 2px solid transparent;
        background-size: 100% 100%, 300% 300%;
        animation: fadeUp 0.35s ease forwards, featuredBorderPulse 4s ease infinite;
    }
    @keyframes featuredBorderPulse {
        0%, 100% { background-position: 0 0, 0% 50%; }
        50% { background-position: 0 0, 100% 50%; }
    }
    /* Shimmer loading animation on cards */
    @keyframes shimmer {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
    }
    .game-card .card-banner .shimmer-overlay {
        position: absolute; inset: 0; overflow: hidden; z-index: 1;
    }
    .game-card .card-banner .shimmer-overlay::before {
        content: ''; position: absolute; inset: 0;
        background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.04) 50%, transparent 100%);
        animation: shimmer 2s ease-in-out infinite;
    }
    /* NO ADS badge */
    .no-ads-badge {
        position: absolute; top: 8px; left: 8px; padding: 2px 8px;
        background: linear-gradient(135deg, #00cc66, #009944); border-radius: 4px;
        font-size: 8px; font-weight: 700; letter-spacing: 1px; z-index: 2; color: #fff;
        font-family: 'Orbitron', sans-serif;
        box-shadow: 0 0 10px rgba(0,204,102,0.4);
    }
    .new-badge ~ .no-ads-badge, .no-ads-badge.shifted {
        top: 8px; left: auto; right: 8px;
    }
    .section-label {
        grid-column: 1 / -1; font-family: 'Orbitron', sans-serif; font-size: 13px;
        color: #333; letter-spacing: 4px; padding: 16px 0 4px; border-bottom: 1px solid rgba(255,255,255,0.04);
        text-transform: uppercase; opacity: 1; animation: none;
    }
    /* ========== MASSIVE VISUAL UPGRADE ========== */
    /* 3D Card tilt on hover */
    .game-card { perspective: 600px; transform-style: preserve-3d; }
    .game-card:hover { transform: translateY(-5px) scale(1.01) rotateX(2deg); }
    /* Favorite heart */
    .fav-btn { position:absolute; top:8px; right:8px; z-index:5; background:none; border:none; font-size:18px; cursor:pointer; opacity:0.3; transition:all 0.3s; filter:grayscale(1); }
    .fav-btn:hover, .fav-btn.active { opacity:1; filter:grayscale(0); transform:scale(1.3); }
    .fav-btn.active { color:#ff0055; text-shadow:0 0 12px rgba(255,0,85,0.6); }
    .game-card.featured .fav-btn { top:12px; right:auto; left:12px; }
    /* Random Game button */
    .random-btn {
        position:absolute; right:12px; top:50%; transform:translateY(-50%);
        background:linear-gradient(135deg, #ff0055, #aa00ff); border:none; color:#fff;
        padding:8px 14px; border-radius:10px; cursor:pointer; font-family:'Orbitron',sans-serif;
        font-size:10px; font-weight:700; letter-spacing:1px; transition:all 0.3s;
        display:flex; align-items:center; gap:6px;
    }
    .random-btn:hover { transform:translateY(-50%) scale(1.05); box-shadow:0 0 25px rgba(255,0,85,0.4); }
    .random-btn .dice { display:inline-block; animation:diceRoll 2s ease infinite; }
    @keyframes diceRoll { 0%,80%,100%{transform:rotate(0deg)} 85%{transform:rotate(15deg)} 90%{transform:rotate(-15deg)} 95%{transform:rotate(10deg)} }
    /* Sort & View controls */
    .controls-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; gap:10px; flex-wrap:wrap; }
    .controls-left, .controls-right { display:flex; align-items:center; gap:8px; }
    .sort-select {
        background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08);
        color:#888; padding:5px 10px; border-radius:8px; font-family:'Share Tech Mono',monospace;
        font-size:11px; cursor:pointer; outline:none;
    }
    .sort-select:focus { border-color:rgba(0,255,204,0.4); }
    .sort-select option { background:#111; color:#ccc; }
    .grid-toggle { display:flex; gap:2px; }
    .grid-toggle button {
        background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08);
        color:#555; padding:5px 8px; cursor:pointer; transition:all 0.2s; font-size:12px;
    }
    .grid-toggle button:first-child { border-radius:6px 0 0 6px; }
    .grid-toggle button:last-child { border-radius:0 6px 6px 0; }
    .grid-toggle button.active { background:rgba(0,255,204,0.1); border-color:rgba(0,255,204,0.3); color:#00ffcc; }
    /* Grid size variations */
    .games-grid.grid-sm { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
    .games-grid.grid-md { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
    .games-grid.grid-lg { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
    /* Game of the Day spotlight */
    .gotd-section {
        margin-bottom:20px; padding:16px 20px; border-radius:14px; position:relative; overflow:hidden;
        background:linear-gradient(135deg, rgba(255,0,85,0.08), rgba(170,0,255,0.08), rgba(0,255,204,0.08));
        border:1px solid rgba(255,255,255,0.06);
    }
    .gotd-section::before {
        content:''; position:absolute; inset:0;
        background:radial-gradient(circle at 20% 50%, rgba(0,255,204,0.12), transparent 60%),
                   radial-gradient(circle at 80% 50%, rgba(255,0,85,0.1), transparent 60%);
        animation:spotlightPulse 4s ease infinite;
    }
    @keyframes spotlightPulse {
        0%,100%{opacity:0.6} 50%{opacity:1}
    }
    .gotd-label { font-family:'Orbitron',sans-serif; font-size:10px; color:#ff0055; letter-spacing:4px; margin-bottom:8px; position:relative; }
    .gotd-content { display:flex; align-items:center; gap:16px; position:relative; }
    .gotd-icon { font-size:48px; filter:drop-shadow(0 0 20px var(--accent)); }
    .gotd-info { flex:1; }
    .gotd-title { font-family:'Orbitron',sans-serif; font-size:20px; font-weight:700; color:#fff; letter-spacing:1px; }
    .gotd-desc { font-size:12px; color:#777; margin-top:4px; }
    .gotd-play {
        padding:10px 24px; background:linear-gradient(135deg,#00ffcc,#00aa88); border:none;
        border-radius:8px; color:#000; font-family:'Orbitron',sans-serif; font-size:12px;
        font-weight:700; letter-spacing:2px; cursor:pointer; transition:all 0.3s;
    }
    .gotd-play:hover { transform:scale(1.05); box-shadow:0 0 30px rgba(0,255,204,0.4); }
    /* Recently Played section */
    .recent-section { margin-bottom:18px; }
    .recent-label { font-family:'Orbitron',sans-serif; font-size:10px; color:#555; letter-spacing:3px; margin-bottom:8px; }
    .recent-row { display:flex; gap:8px; overflow-x:auto; padding-bottom:6px; scrollbar-width:thin; scrollbar-color:#222 transparent; }
    .recent-chip {
        flex-shrink:0; padding:6px 14px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06);
        border-radius:8px; cursor:pointer; transition:all 0.2s; font-size:11px; color:#888; white-space:nowrap;
        display:flex; align-items:center; gap:6px;
    }
    .recent-chip:hover { border-color:rgba(0,255,204,0.3); color:#ccc; }
    .recent-chip .rc-icon { font-size:14px; }
    /* Stats bar */
    .stats-bar { display:flex; justify-content:center; gap:30px; padding:20px 0 10px; flex-wrap:wrap; }
    .stat-item { text-align:center; }
    .stat-num { font-family:'Orbitron',sans-serif; font-size:22px; font-weight:700; color:#00ffcc; }
    .stat-label { font-size:9px; color:#444; letter-spacing:2px; margin-top:2px; }
    /* Scroll reveal */
    .game-card.reveal-hidden { opacity:0; transform:translateY(20px); }
    .game-card.reveal-visible { opacity:1; transform:translateY(0); transition:opacity 0.4s, transform 0.4s; }
    /* Tag glow on hover */
    .tag:hover { box-shadow:0 0 12px rgba(0,255,204,0.15); }
    .tag.tag-fav { border-color:rgba(255,0,85,0.4); color:#ff0055; }
    .tag.tag-fav:hover { border-color:rgba(255,0,85,0.6); color:#ff4488; }
    .tag.tag-fav.active { border-color:#ff0055; color:#ff0055; background:rgba(255,0,85,0.1); box-shadow:0 0 12px rgba(255,0,85,0.2); }
    .tag.tag-recent { border-color:rgba(170,0,255,0.4); color:#aa00ff; }
    .tag.tag-recent:hover { border-color:rgba(170,0,255,0.6); color:#cc44ff; }
    .tag.tag-recent.active { border-color:#aa00ff; color:#aa00ff; background:rgba(170,0,255,0.1); box-shadow:0 0 12px rgba(170,0,255,0.2); }

    /* ========== SCROLL PROGRESS BAR ========== */
    #scroll-progress {
        position:fixed; top:0; left:0; height:3px; width:0%;
        background:linear-gradient(90deg, #00ffcc, #ff0055, #aa00ff);
        z-index:99999; transition:width 0.05s linear; pointer-events:none;
        box-shadow:0 0 10px rgba(0,255,204,0.6), 0 0 20px rgba(255,0,85,0.3);
    }

    /* ========== STAR RATING ========== */
    .star-rating { display:flex; gap:1px; margin-top:4px; }
    .star-rating .star {
        cursor:pointer; font-size:13px; color:#333; transition:all 0.15s;
        filter:grayscale(1); opacity:0.4;
    }
    .star-rating .star.filled {
        color:#ffcc00; filter:grayscale(0); opacity:1;
        text-shadow:0 0 8px rgba(255,204,0,0.6);
    }
    .star-rating .star:hover {
        color:#ffcc00; filter:grayscale(0); opacity:1;
        text-shadow:0 0 8px rgba(255,204,0,0.6); transform:scale(1.3);
    }

    /* ========== PLAY TIME TOOLTIP ========== */
    .playtime-tooltip {
        position:absolute; bottom:100%; left:50%; transform:translateX(-50%);
        background:rgba(0,0,0,0.9); border:1px solid rgba(0,255,204,0.3); border-radius:6px;
        padding:4px 10px; font-size:9px; color:#00ffcc; white-space:nowrap;
        pointer-events:none; opacity:0; transition:opacity 0.2s; z-index:10;
        backdrop-filter:blur(10px); letter-spacing:1px;
        font-family:'Orbitron',sans-serif;
    }
    .game-card:hover .playtime-tooltip { opacity:1; }

    /* ========== ACHIEVEMENT PANEL ========== */
    .trophy-btn {
        position:fixed; top:16px; right:16px; z-index:9000;
        width:44px; height:44px; border-radius:50%;
        background:rgba(0,0,0,0.6); border:1px solid rgba(255,204,0,0.3);
        color:#ffcc00; font-size:20px; cursor:pointer;
        backdrop-filter:blur(10px); transition:all 0.3s;
        display:flex; align-items:center; justify-content:center;
    }
    .trophy-btn:hover { border-color:#ffcc00; background:rgba(255,204,0,0.1); box-shadow:0 0 20px rgba(255,204,0,0.3); transform:scale(1.1); }
    .trophy-btn .badge-count {
        position:absolute; top:-4px; right:-4px; background:#ff0055;
        color:#fff; font-size:9px; min-width:16px; height:16px;
        border-radius:8px; display:flex; align-items:center; justify-content:center;
        font-family:'Orbitron',sans-serif; font-weight:700;
    }
    .achievement-panel {
        position:fixed; top:0; right:-420px; width:400px; max-width:90vw; height:100vh;
        background:rgba(6,6,12,0.97); border-left:1px solid rgba(255,204,0,0.15);
        z-index:9500; transition:right 0.4s cubic-bezier(0.4,0,0.2,1);
        backdrop-filter:blur(20px); overflow-y:auto; padding:24px;
    }

(function(){
    const c = document.getElementById('bg-canvas'), ctx = c.getContext('2d');
    let w, h, particles = [];
    function resize(){ w = c.width = innerWidth; h = c.height = innerHeight; }
    resize(); addEventListener('resize', resize);
    for(let i = 0; i < 60; i++) particles.push({ x: Math.random()*2000, y: Math.random()*2000, r: Math.random()*1.5+0.3, dx: (Math.random()-0.5)*0.3, dy: (Math.random()-0.5)*0.3, a: Math.random()*0.3+0.05 });
    function draw(){
        ctx.clearRect(0,0,w,h);
        particles.forEach(p => {
            p.x += p.dx; p.y += p.dy;
            if(p.x < 0) p.x = w; if(p.x > w) p.x = 0;
            if(p.y < 0) p.y = h; if(p.y > h) p.y = 0;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
            ctx.fillStyle = `rgba(0,255,204,${p.a})`; ctx.fill();
        });
        requestAnimationFrame(draw);
    }
    draw();
})();

const TAG_LABELS = { all:'All', favorites:'Favorites ❤️', recent:'Recent 🕐', 'no-ads':'No Ads ✅', shooter:'Shooter', io:'IO Games', strategy:'Strategy', platformer:'Platformer', puzzle:'Puzzle', racing:'Racing', arcade:'Arcade', sports:'Sports', multiplayer:'Multiplayer', fighting:'Fighting', horror:'Horror', idle:'Idle', music:'Music', simulation:'Simulation' };

const countEl = document.getElementById('game-count');
const overlay = document.getElementById('game-overlay');
const gameFrame = document.getElementById('game-frame');
const tagsEl = document.getElementById('tags');

let currentSort = 'default';
let currentGridSize = 'md';
let currentOpenGameTitle = '';
let currentOpenGameStart = 0;

// ===== PLAY TIME TRACKER =====
let playTimes = JSON.parse(localStorage.getItem('va_playtimes') || '{}');
let totalPlayTime = Object.values(playTimes).reduce((a,b)=>a+b, 0);

// ===== ACHIEVEMENT SYSTEM =====
let achievements = JSON.parse(localStorage.getItem('va_achievements') || '{}');
let gamesPlayed = JSON.parse(localStorage.getItem('va_games_played') || '[]');
let easterEggFound = JSON.parse(localStorage.getItem('va_easter_egg') || 'false');
let dailyChallengeCompleted = JSON.parse(localStorage.getItem('va_daily_challenge') || '{}');

// ===== SOUND SYSTEM =====
let soundEnabled = JSON.parse(localStorage.getItem('va_sound') || 'false');

// ===== FAVORITES SYSTEM =====
let favorites = JSON.parse(localStorage.getItem('va_favorites') || '[]');
function toggleFavorite(title, e) {
    e.stopPropagation(); e.preventDefault();
    const idx = favorites.indexOf(title);
    if (idx >= 0) favorites.splice(idx, 1); else favorites.push(title);
    localStorage.setItem('va_favorites', JSON.stringify(favorites));
    buildTags();
    renderGames(search.value.toLowerCase(), activeTag);
}

// ===== RECENTLY PLAYED =====
let recentlyPlayed = JSON.parse(localStorage.getItem('va_recent') || '[]');
function addRecent(title) {
    recentlyPlayed = recentlyPlayed.filter(t => t !== title);
    recentlyPlayed.unshift(title);
    if (recentlyPlayed.length > 10) recentlyPlayed.pop();
    localStorage.setItem('va_recent', JSON.stringify(recentlyPlayed));
    if (!gamesPlayed.includes(title)) {
        gamesPlayed.push(title);
        localStorage.setItem('va_games_played', JSON.stringify(gamesPlayed));
    }
    checkAchievements();
    renderRecent();
}
function renderRecent() {
    const el = document.getElementById('recent-container');
    if (!recentlyPlayed.length) { el.innerHTML = ''; return; }
    const chips = recentlyPlayed.map(t => {
        const g = GAMES.find(g => g.title === t);
        if (!g) return '';
        return `<div class="recent-chip" onclick="playGame(GAMES.find(g=>g.title==='${t.replace(/'/g,"\\'")}'))"><span class="rc-icon">${g.icon}</span>${g.title}</div>`;
    }).join('');
    el.innerHTML = `<div class="recent-section"><div class="recent-label">RECENTLY PLAYED</div><div class="recent-row">${chips}</div></div>`;
}

// ===== GAME OF THE DAY =====
function renderGOTD() {
    const dayIndex = Math.floor(Date.now() / 86400000) % GAMES.length;
    const g = GAMES[dayIndex];
    const el = document.getElementById('gotd-container');
    el.innerHTML = `<div class="gotd-section" style="--accent:${g.accent}">
        <div class="gotd-label">⭐ GAME OF THE DAY</div>
        <div class="gotd-content">
            <div class="gotd-icon">${g.icon}</div>
            <div class="gotd-info"><div class="gotd-title">${g.title}</div><div class="gotd-desc">${g.desc}</div></div>
            <button class="gotd-play" onclick="playGame(GAMES[${dayIndex}])">PLAY NOW</button>
        </div>
    </div>`;
}
function playGame(g) {
    if (!g) return;
    addRecent(g.title);
    if (g.href) window.location.href = g.href;
    else if (g.embed && g.direct) window.open(g.embed, '_blank');
    else if (g.embed) openGame(g.embed, g.title);
}

// Build tags with counts
function buildTags() {
    const counts = {};
    GAMES.forEach(g => (g.tags||[]).forEach(t => counts[t] = (counts[t]||0)+1));
    counts['no-ads'] = GAMES.filter(g => g.noAds).length;
    counts['favorites'] = favorites.length;
    counts['recent'] = recentlyPlayed.length;
    tagsEl.innerHTML = TAG_ORDER.map(t => {
        const label = TAG_LABELS[t] || t;
        const count = t === 'all' ? GAMES.length : (counts[t]||0);
        const cls = t==='all'?' active':'';
        const special = t==='no-ads'?' tag-no-ads': t==='favorites'?' tag-fav': t==='recent'?' tag-recent':'';
        if ((t==='favorites' && !favorites.length) || (t==='recent' && !recentlyPlayed.length)) return '';
        return `<span class="tag${cls}${special}" data-tag="${t}">${label}<span class="tag-count">${count}</span></span>`;
    }).join('');
}

function sortGames(arr) {
    if (currentSort === 'az') return [...arr].sort((a,b) => a.title.localeCompare(b.title));
    if (currentSort === 'za') return [...arr].sort((a,b) => b.title.localeCompare(a.title));
    if (currentSort === 'featured') return [...arr].sort((a,b) => (b.featured?1:0)-(a.featured?1:0) || (b.noAds?1:0)-(a.noAds?1:0));
    if (currentSort === 'noads') return [...arr].sort((a,b) => (b.noAds?1:0)-(a.noAds?1:0));
    if (currentSort === 'rated') return [...arr].sort((a,b) => (gameRatings[b.title]||0)-(gameRatings[a.title]||0));
    if (currentSort === 'played') return [...arr].sort((a,b) => (playTimes[b.title]||0)-(playTimes[a.title]||0));
    return arr;
}

function renderGames(filter = '', tag = 'all') {
    grid.innerHTML = '';

        let matchTag = true;
        if (tag === 'no-ads') matchTag = g.noAds;
        else if (tag === 'favorites') matchTag = favorites.includes(g.title);
        else if (tag === 'recent') matchTag = recentlyPlayed.includes(g.title);
        else if (tag !== 'all') matchTag = g.tags && g.tags.includes(tag);
        return matchSearch && matchTag;
    });
    filtered = sortGames(filtered);
    noResults.style.display = filtered.length === 0 ? 'block' : 'none';
    countEl.textContent = filtered.length + ' GAME' + (filtered.length !== 1 ? 'S' : '') + ' AVAILABLE';

    filtered.forEach((g, i) => {
        const card = document.createElement(g.embed ? 'div' : 'a');

        else if (g.embed) card.onclick = () => { addRecent(g.title); openGame(g.embed, g.title); };

        const isFav = favorites.includes(g.title);

let audioCtx = null;
function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playSound(type) {
    if (!soundEnabled) return;
    try {
        initAudio();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        gain.gain.value = 0.04;
        if (type === 'hover') {
            osc.type = 'sine'; osc.frequency.value = 800;
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
            osc.start(); osc.stop(audioCtx.currentTime + 0.08);
        } else if (type === 'click') {
            osc.type = 'square'; osc.frequency.value = 600;
            osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.06);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'filter') {
            osc.type = 'triangle'; osc.frequency.value = 400;
            osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.12);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
            osc.start(); osc.stop(audioCtx.currentTime + 0.15);
        } else if (type === 'achievement') {
            osc.type = 'sine'; osc.frequency.value = 523;
            gain.gain.value = 0.06;
            osc.start();
            setTimeout(() => {
                const o2 = audioCtx.createOscillator();
                const g2 = audioCtx.createGain();
                o2.connect(g2); g2.connect(audioCtx.destination);
                o2.type = 'sine'; o2.frequency.value = 659; g2.gain.value = 0.06;
                g2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                o2.start(); o2.stop(audioCtx.currentTime + 0.3);
            }, 120);
            setTimeout(() => {
                const o3 = audioCtx.createOscillator();
                const g3 = audioCtx.createGain();
                o3.connect(g3); g3.connect(audioCtx.destination);
                o3.type = 'sine'; o3.frequency.value = 784; g3.gain.value = 0.06;
                g3.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
                o3.start(); o3.stop(audioCtx.currentTime + 0.4);
            }, 240);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
            osc.stop(audioCtx.currentTime + 0.15);
        }
    } catch(e) {}
}

function renderDailyChallenge() {

            : `<button class="dc-play" onclick="playDailyChallenge()">ACCEPT</button>`
        }

function playDailyChallenge() {
    const dc = getDailyChallenge();
    const today = dc.date;
    dailyChallengeCompleted[today] = true;
    localStorage.setItem('va_daily_challenge', JSON.stringify(dailyChallengeCompleted));
    playGame(dc.game);
    checkAchievements();
    renderDailyChallenge();
}
renderDailyChallenge();

</script>
